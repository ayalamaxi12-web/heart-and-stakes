<style>
  :root{--surface:#2d2230;--glow:#f4b860;--glow-soft:#ffd9a0;--rose:#e8717a;--teal:#6db3c9;
    --text:#f5ece4;--muted:#b9a8b0;--line:rgba(244,184,96,.18);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{font-family:"DM Sans",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--text);
    background:radial-gradient(120% 120% at 50% 0%,#2a1d2e 0%,#1a1320 55%,#120c16 100%);overflow:hidden;position:fixed;inset:0;}
  #scene{position:fixed;inset:0;z-index:0;touch-action:none;}
  #ui{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;pointer-events:none;overflow-y:auto;}
  .panel{pointer-events:auto;width:100%;max-width:460px;margin:auto;}
  h1,h2,h3{font-family:"Fraunces",Georgia,serif;font-weight:500;margin:0;line-height:1.08;}
  .display{font-size:clamp(32px,8.5vw,50px);letter-spacing:-.01em;}
  .eyebrow{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--glow);font-weight:700;}
  p{color:var(--muted);line-height:1.5;font-size:15px;}
  .card{background:linear-gradient(180deg,var(--surface) 0%,#271c2b 100%);border:1px solid var(--line);border-radius:24px;padding:22px 20px;
    box-shadow:0 30px 80px -30px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.04);backdrop-filter:blur(6px);animation:rise .42s cubic-bezier(.2,.8,.2,1) both;}
  @keyframes rise{from{opacity:0;transform:translateY(14px) scale(.98);}to{opacity:1;transform:none;}}
  .btn{pointer-events:auto;display:block;width:100%;border:none;cursor:pointer;font-family:"DM Sans";font-weight:700;font-size:16px;padding:15px 18px;border-radius:15px;margin-top:11px;color:#241a14;transition:transform .12s;background:linear-gradient(180deg,var(--glow-soft),var(--glow));box-shadow:0 10px 24px -8px rgba(244,184,96,.5);}
  .btn:active{transform:translateY(1px) scale(.99);}
  .btn.ghost{background:transparent;color:var(--text);border:1px solid var(--line);box-shadow:none;font-weight:500;}
  .btn.sm{font-size:13px;padding:9px 12px;margin-top:0;width:auto;}
  .field,textarea.field,select.field{width:100%;background:#211824;border:1px solid var(--line);color:var(--text);border-radius:14px;padding:13px 15px;font-family:"DM Sans";font-size:16px;margin-top:10px;}
  textarea.field{resize:vertical;min-height:74px;line-height:1.4;}select.field{appearance:none;}
  .field:focus{outline:none;border-color:var(--glow);}
  .code{font-family:"Fraunces";font-size:44px;letter-spacing:.32em;text-align:center;color:var(--glow);margin:12px 0;}
  .swatches{display:flex;gap:9px;margin-top:9px;flex-wrap:wrap;}
  .sw{width:34px;height:34px;border-radius:50%;cursor:pointer;border:2px solid transparent;background-position:center;}
  .sw.sel{border-color:var(--text);transform:scale(1.12);}
  .lbl{font-size:12px;color:var(--muted);margin-top:12px;}
  .who{font-family:"Fraunces";font-size:13px;}
  .tag{display:inline-block;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--glow);font-weight:700;margin-bottom:12px;}
  .prompt{font-family:"Fraunces";font-size:clamp(21px,5.6vw,27px);line-height:1.22;margin:4px 0;}
  .center{text-align:center;}.spacer{height:10px;}.mini{font-size:13px;color:var(--muted);margin-top:14px;}
  .legend{display:flex;flex-wrap:wrap;gap:6px 12px;justify-content:center;margin-top:14px;font-size:12px;color:var(--muted);}
  .wait{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .pulse{width:54px;height:54px;border-radius:50%;background:radial-gradient(circle at 35% 30%,var(--glow-soft),var(--glow));animation:pulse 1.6s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(.92);opacity:.7;}50%{transform:scale(1.05);opacity:1;}}
  #hud{position:fixed;top:0;left:0;right:0;z-index:3;padding:12px 14px;display:none;gap:10px;pointer-events:none;}
  .score{flex:1;background:rgba(20,14,22,.55);border:1px solid var(--line);border-radius:14px;padding:7px 11px;backdrop-filter:blur(8px);}
  .score.me{border-color:var(--glow);}

  .score .sp{font-family:"Fraunces";font-size:20px;}.score .spl{font-size:10px;color:var(--muted);}

  .connbar{height:12px;border-radius:8px;background:rgba(20,14,22,.6);border:1px solid var(--line);overflow:hidden;}

  .connlbl{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:6px;}
  #veil{position:fixed;inset:0;z-index:5;display:none;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center;background:radial-gradient(80% 60% at 50% 45%,#2a1d2e,#120c16);}
  .seal{width:104px;height:104px;border-radius:50%;margin-bottom:20px;background:radial-gradient(circle at 35% 30%,var(--glow-soft),var(--glow) 60%,#c98a2e);box-shadow:0 16px 50px -10px rgba(244,184,96,.5);display:flex;align-items:center;justify-content:center;font-size:44px;animation:pulse 2.4s ease-in-out infinite;}
  .ed-scroll{max-height:54vh;overflow-y:auto;margin:6px -4px 0;padding:0 4px;}
  .ed-cat{font-family:"Fraunces";font-size:18px;margin:16px 0 4px;}
  .ed-cat .h{font-size:12px;color:var(--muted);font-family:"DM Sans";font-weight:400;}
  .ed-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid rgba(244,184,96,.08);}
  .ed-row .tx{flex:1;font-size:14px;line-height:1.35;}.ed-row.off .tx{opacity:.4;}
  .chk{width:26px;height:26px;border-radius:8px;border:1px solid var(--line);background:#211824;color:var(--glow);font-size:15px;cursor:pointer;flex:none;display:flex;align-items:center;justify-content:center;}
  .chk.on{background:linear-gradient(180deg,var(--glow-soft),var(--glow));color:#241a14;border-color:transparent;}
  .ico{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:4px;}
  .toprow{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .hint{position:fixed;top:60px;left:0;right:0;text-align:center;z-index:1;font-size:11px;color:rgba(185,168,176,.5);pointer-events:none;}
  .foottag{position:fixed;bottom:5px;left:0;right:0;text-align:center;z-index:1;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(185,168,176,.4);}
  @media (prefers-reduced-motion: reduce){*{animation:none !important;transition:none !important;}}
</style>

<body>
  <canvas id="scene"></canvas>

    <div class="score" id="sc1"><div class="nm"><span class="hav" id="hav1"></span><span id="n1">Jugador 1</span></div><div class="sp" id="sp1">0</div><div class="spl">Chispas</div></div>
    <div class="score" id="sc2"><div class="nm"><span class="hav" id="hav2"></span><span id="n2">Jugador 2</span></div><div class="sp" id="sp2">0</div><div class="spl">Chispas</div></div>
  </div>
  <div id="conn"><div class="connlbl" id="connlbl">Conexión</div><div class="connbar"><div class="connfill" id="connfill"></div></div></div>

    <div class="seal">🤫</div>
    <h2 class="display" id="veilTitle">En secreto</h2>
    <p id="veilText" style="max-width:320px;"></p>
    <button class="btn" id="veilBtn" style="max-width:320px;">Ya tengo el teléfono</button>
    <div class="mini">Pasá el teléfono antes de tocar.</div>
  </div>
  <div class="foottag">NOVA FORGE STUDIO · prototipo</div>

<script>
/* ===========================================================================
   CORAZONES Y APUESTAS — entrega final · NOVA FORGE STUDIO
   Arquitectura motor/contenido (GDD §4) + máquina de estados con sincronización
   de vistas que sirve para DOS modos sin reescribir la lógica:
     · "Un solo teléfono"  -> se pasan el aparato (pase a ciegas en Revelar)
     · "Dos teléfonos"     -> PeerJS (código de sala, sin servidor); cada uno
                              en su pantalla, el adivinar ya es privado de verdad
   El host es la fuente de verdad; el invitado es un terminal que manda intenciones.
   =========================================================================== */

/* ----------------------- CONTENIDO POR DEFECTO --------------------------- */
const CAT_LABEL={reveal:'Revelar y adivinar',match:'¿En sintonía?',playful:'Juego / Reto',connection:'Momento',wager:'Apuesta'};
const CAT_HELP={reveal:'Una pregunta sobre quien responde. Escribí {a} para su nombre.',match:'Una opción A o B para responder al mismo tiempo.',
  playful:'Un reto para hacer. Escribí {p} para el nombre de la pareja.',connection:'Un momento lindo, sin puntos.',wager:'Una apuesta opcional con premio.'};
const DEFAULT_CONTENT={
  reveal:["{a}, ¿cuál sería tu domingo perfecto sin hacer nada?","{a}, si pudiéramos teletransportarnos ahora mismo, ¿a dónde irías?",
    "{a}, ¿qué cosa chiquita siempre te alegra el día?","{a}, ¿cuál es tu canción de consuelo secreta?","{a}, ¿qué pedís siempre en el café?",
    "{a}, ¿en qué mundo de ficción te gustaría vivir?","{a}, ¿qué es lo primero que comprarías si la plata no importara?",
    "{a}, ¿qué comida podrías comer feliz todos los días?","{a}, ¿cuál es tu idea de una cita perfecta?","{a}, ¿en qué sos raramente bueno/a?",
    "{a}, ¿cuál es el emoji que más usás?","{a}, ¿de qué cosa chiquita estás orgulloso/a esta semana?"],
  match:["¿Montaña o playa?","¿Madrugador/a o nocturno/a?","¿Dulce o salado?","¿Planear todo o fluir?","¿Fiesta grande o noche tranquila en casa?",
    "¿Mensajes o llamadas?","¿Amanecer o atardecer?","¿Cocinar en casa o salir a comer?"],
  playful:["Dale a {p} un discurso motivador de 10 segundos.","Hacé tu mejor imitación de {p} pidiendo un café.",
    "Describí a {p} usando solo títulos de películas.","Decile a {p} un cumplido que nunca le hayas dicho.","Recreá la cara que pusiste en su primera cita."],
  connection:["Díganse una cosa por la que están agradecidos hoy.","Compartan un recuerdo de ustedes dos que siempre los haga sonreír.",
    "Nombren algo que tengan ganas de hacer juntos.","Levantá la vista del teléfono y decí algo lindo, en voz alta."],
  wager:["Concurso de miradas de 10 segundos. El que pierde prepara el próximo snack.","El primero que se ría hace el baile ridículo que elija el otro.",
    "Piedra, papel o tijera: el ganador elige la próxima canción."]};

/* ----------------------- ALMACÉN (persistencia) -------------------------- */
const LS_CONTENT='cya_content_v1',LS_PROFILE='cya_profile_v3';
let storageOK=true;
function lsGet(k){try{return localStorage.getItem(k);}catch(e){storageOK=false;return null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);return true;}catch(e){storageOK=false;return false;}}
const Content={items:[],_seq:0,
  newId(){return 'p'+Date.now().toString(36)+(this._seq++);},
  build(){this.items=[];Object.keys(DEFAULT_CONTENT).forEach(cat=>{DEFAULT_CONTENT[cat].forEach(text=>this.items.push({id:this.newId(),cat,text,enabled:true,custom:false}));});},
  load(){const raw=lsGet(LS_CONTENT);if(raw){try{const o=JSON.parse(raw);if(o&&Array.isArray(o.items)&&o.items.length){this.items=o.items;return;}}catch(e){}}this.build();this.save();},
  save(){lsSet(LS_CONTENT,JSON.stringify({items:this.items}));},
  byCat(c){return this.items.filter(i=>i.cat===c);},enabled(c){return this.items.filter(i=>i.cat===c&&i.enabled);},has(c){return this.enabled(c).length>0;},
  toggle(id){const it=this.items.find(i=>i.id===id);if(it){it.enabled=!it.enabled;this.save();}},
  add(c,t){this.items.push({id:this.newId(),cat:c,text:t.trim(),enabled:true,custom:true});this.save();},
  edit(id,t){const it=this.items.find(i=>i.id===id);if(it){it.text=t.trim();this.save();}},
  remove(id){this.items=this.items.filter(i=>i.id!==id);this.save();},reset(){this.build();this.save();}};
const AVATAR_EMOJIS=['🦊','🐼','🐨','🦁','🐯','🐸','🦄','🐙','🐵','🐱','🐶','🦖'];
function defProfile(name,color,emoji){return {name:name||"",color,avatar:{type:'emoji',value:emoji}};}
const Profile={
  data:{p1:defProfile("",0xe8717a,'🦊'),p2:defProfile("",0x6db3c9,'🐼')},
  me:defProfile("",0xe8717a,'🦄'),
  load(){const raw=lsGet(LS_PROFILE);if(raw){try{const o=JSON.parse(raw);if(o){if(o.data)this.data=o.data;if(o.me)this.me=o.me;}}catch(e){}}},
  save(){lsSet(LS_PROFILE,JSON.stringify({data:this.data,me:this.me}));}};

/* ----------------------------- MODE PACK --------------------------------- */
const SYMBOLS={salida:{emoji:'⭐',color:0xf4b860,label:'Salida'},pregunta:{emoji:'❓',color:0x8fb8e0,label:'Pregunta'},
  reto:{emoji:'🎭',color:0xe8717a,label:'Reto'},apuesta:{emoji:'🔥',color:0xff9d5c,label:'Apuesta'},
  momento:{emoji:'💛',color:0x8fd6a0,label:'Momento'},premio:{emoji:'🎁',color:0xd9a8f0,label:'Premio'}};
const MODE_PACK={scoring:{reveal:{nailed:{sp:3,conn:14},close:{sp:2,conn:9},wayoff:{answererSp:3,conn:5}},match:{sp:1,conn:8},playful:{sp:2,conn:7},reward:{sp:2,conn:4},wager_win:{sp:3,conn:6},wager_skip:{conn:3}},
  win:{lapsToGoal:1,connectionDeep:60,turnCap:18},
  boardTypes:["salida","pregunta","reto","premio","pregunta","momento","pregunta","apuesta","reto","pregunta","premio","reto","momento","pregunta","apuesta","reto"]};

/* ----------------------------- MOTOR ------------------------------------- */
let lastDraw={};
const Engine={state:null,
  newGame(p0,p1){this.state={players:[{name:p0.name||"Jugador 1",color:p0.color,sparks:0,pos:0,laps:0},{name:p1.name||"Jugador 2",color:p1.color,sparks:0,pos:0,laps:0}],connection:0,active:0,turn:0,view:{s:'turn'},roll:0};lastDraw={};return this.state;},
  roll(){return 1+Math.floor(Math.random()*3);},
  drawByCat(cat){let pool=Content.enabled(cat);if(!pool.length)return null;if(pool.length>1)pool=pool.filter(i=>i.id!==lastDraw[cat]);const pick=pool[Math.floor(Math.random()*pool.length)];lastDraw[cat]=pick.id;return pick.text;},
  tileCat(pos){return MODE_PACK.boardTypes[pos%MODE_PACK.boardTypes.length];},
  advance(steps){const s=this.state,p=s.players[s.active],n=MODE_PACK.boardTypes.length;for(let i=0;i<steps;i++){p.pos=(p.pos+1)%n;if(p.pos===0)p.laps++;}return p.pos;},
  addScore({playerIdx=null,sparks=0,conn=0}={}){const s=this.state;if(playerIdx!==null)s.players[playerIdx].sparks+=sparks;s.connection=Math.min(100,s.connection+conn);},
  checkWin(){const s=this.state,w=MODE_PACK.win;return s.players.some(p=>p.laps>=w.lapsToGoal)||s.turn>=w.turnCap;},
  endTurn(){const s=this.state;s.active=s.active===0?1:0;s.turn++;}};
function activeName(){return Engine.state.players[Engine.state.active].name;}
function partnerIdx(){return Engine.state.active===0?1:0;}
function partnerName(){return Engine.state.players[partnerIdx()].name;}

/* ----------------------------- RED (PeerJS) ------------------------------ */
const NET={mode:'local',role:'local',myIdx:0,peer:null,conn:null,code:null,
  reset(){this.mode='local';this.role='local';this.myIdx=0;try{if(this.conn)this.conn.close();if(this.peer)this.peer.destroy();}catch(e){}this.conn=null;this.peer=null;this.code=null;},
  send(m){try{if(this.conn&&this.conn.open)this.conn.send(m);}catch(e){}},
  snapshot(){const s=Engine.state;return {players:s.players,connection:s.connection,active:s.active,turn:s.turn,view:s.view,roll:s.roll};},
  syncState(){if(this.role==='host')this.send({t:'state',state:this.snapshot()});},
  available(){return typeof Peer!=='undefined';},
  genCode(){const ch='ABCDEFGHJKMNPQRSTUVWXYZ23456789';let c='';for(let i=0;i<4;i++)c+=ch[Math.floor(Math.random()*ch.length)];return c;},
  startHost(onState){this.mode='online';this.role='host';this.myIdx=0;this.code=this.genCode();
    this.peer=new Peer('cya-'+this.code,{debug:0});
    this.peer.on('open',()=>onState('waiting'));
    this.peer.on('error',e=>onState('error',e&&e.type));
    this.peer.on('connection',c=>{this.conn=c;
      c.on('open',()=>{});
      c.on('data',m=>this.onData(m));
      c.on('close',()=>onNetClosed());});},
  startGuest(code,onState){this.mode='online';this.role='guest';this.myIdx=1;this.code=code;
    this.peer=new Peer(null,{debug:0});
    this.peer.on('open',()=>{const c=this.peer.connect('cya-'+code,{reliable:true});this.conn=c;
      c.on('open',()=>{this.send({t:'profile',profile:Profile.me});onState('connected');});
      c.on('data',m=>this.onData(m));
      c.on('close',()=>onNetClosed());});
    this.peer.on('error',e=>onState('error',e&&e.type));},
  onData(m){if(!m)return;
    if(m.t==='profile'){ // host receives guest profile -> start
      Profile.data.p1=Profile.me;Profile.data.p2=m.profile;Profile.save();
      Engine.newGame(Profile.data.p1,Profile.data.p2);Engine.state.view={s:'turn'};
      this.send({t:'players',p0:Profile.data.p1,p1:Profile.data.p2});
      onGameReady();this.syncState();render();
    } else if(m.t==='players'){ // guest receives both profiles
      Profile.data.p1=m.p0;Profile.data.p2=m.p1;Profile.save();onGameReady();
    } else if(m.t==='state'){ // guest receives authoritative state
      Engine.state=Object.assign({},m.state);refreshHud();syncBoard();render();
    } else if(m.t==='intent'){ // host receives guest intent
      if(this.role==='host')hostApply(m.intent,m.payload,1);
    }}};
function onNetClosed(){alert('Se cortó la conexión con el otro teléfono.');NET.reset();screenStart();}

/* ----------------------------- TABLERO 3D -------------------------------- */
let renderer,scene,camera,tiles=[],tileIcons=[],tokens=[],die,dieSpin=0,raf,scene3DReady=false,lastPos=[-1,-1];
const camState={radius:14,theta:0,phi:0.92};
function ringPositions(){const N=5,gap=1.32,off=(N-1)/2,ring=[],pts=[];
  for(let c=0;c<N;c++)ring.push([0,c]);for(let r=1;r<N;r++)ring.push([r,N-1]);for(let c=N-2;c>=0;c--)ring.push([N-1,c]);for(let r=N-2;r>=1;r--)ring.push([r,0]);
  ring.forEach(([r,c])=>pts.push([(c-off)*gap,0,(r-off)*gap]));return pts;}
function updateCamera(){if(!camera)return;const r=camState.radius,p=camState.phi,t=camState.theta;
  camera.position.set(r*Math.sin(p)*Math.sin(t),r*Math.cos(p),r*Math.sin(p)*Math.cos(t));camera.lookAt(0,0,0);}
function symbolTexture(emoji,bgHex){const c=document.createElement('canvas');c.width=c.height=128;const x=c.getContext('2d');
  x.fillStyle=bgHex;x.fillRect(0,0,128,128);x.font='72px serif';x.textAlign='center';x.textBaseline='middle';x.fillText(emoji,64,72);return new THREE.CanvasTexture(c);}
function iconBadge(emoji,bgHex){const c=document.createElement('canvas');c.width=c.height=160;const x=c.getContext('2d');
  x.save();x.shadowColor=bgHex;x.shadowBlur=26;x.fillStyle=bgHex;x.beginPath();x.arc(80,80,62,0,7);x.fill();x.restore();
  x.beginPath();x.arc(80,80,62,0,7);x.fillStyle=bgHex;x.fill();
  const g=x.createRadialGradient(58,52,6,80,80,66);g.addColorStop(0,'rgba(255,255,255,.6)');g.addColorStop(.55,'rgba(255,255,255,0)');
  x.fillStyle=g;x.beginPath();x.arc(80,80,62,0,7);x.fill();
  x.strokeStyle='rgba(255,255,255,.35)';x.lineWidth=3;x.beginPath();x.arc(80,80,61,0,7);x.stroke();
  x.font='74px serif';x.textAlign='center';x.textBaseline='middle';x.fillText(emoji,80,86);
  const t=new THREE.CanvasTexture(c);return t;}
function avatarTexture(entry,ringHex){const c=document.createElement('canvas');c.width=c.height=128;const x=c.getContext('2d');
  x.fillStyle=ringHex;x.beginPath();x.arc(64,64,62,0,7);x.fill();x.fillStyle='#1a1320';x.beginPath();x.arc(64,64,55,0,7);x.fill();
  const tex=new THREE.CanvasTexture(c);
  if(entry&&entry.avatar&&entry.avatar.type==='photo'){const img=new Image();img.onload=()=>{x.save();x.beginPath();x.arc(64,64,55,0,7);x.clip();
    const s=Math.max(110/img.width,110/img.height),w=img.width*s,h=img.height*s;x.drawImage(img,64-w/2,64-h/2,w,h);x.restore();tex.needsUpdate=true;};img.src=entry.avatar.value;}
  else{const emo=(entry&&entry.avatar&&entry.avatar.type==='emoji')?entry.avatar.value:'😊';x.font='66px serif';x.textAlign='center';x.textBaseline='middle';x.fillText(emo,64,70);tex.needsUpdate=true;}
  return tex;}
function buildToken(i){const g=new THREE.Group(),col=i===0?0xe8717a:0x6db3c9;
  const ring=new THREE.Mesh(new THREE.TorusGeometry(.3,.06,12,28),new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:.45,roughness:.3,metalness:.4}));ring.rotation.x=Math.PI/2;ring.position.y=.02;
  const body=new THREE.Mesh(new THREE.CylinderGeometry(.1,.24,.5,20),new THREE.MeshStandardMaterial({color:col,roughness:.25,metalness:.4}));body.position.y=.27;
  const disc=new THREE.Mesh(new THREE.PlaneGeometry(.64,.64),new THREE.MeshBasicMaterial({transparent:true,side:THREE.DoubleSide}));disc.position.y=.95;
  g.add(ring);g.add(body);g.add(disc);g.userData={ring,body,disc};return g;}
function initScene(){if(typeof THREE==='undefined'){console.warn('Sin 3D — corre igual.');return;}
  const cv=document.getElementById('scene');renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});renderer.setPixelRatio(Math.min(devicePixelRatio,2));resize();
  scene=new THREE.Scene();camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,100);updateCamera();
  scene.add(new THREE.AmbientLight(0xffe7c4,.55));const key=new THREE.PointLight(0xffd9a0,1.6,50);key.position.set(0,9,3);scene.add(key);
  const rim=new THREE.DirectionalLight(0x6db3c9,.5);rim.position.set(-5,4,-6);scene.add(rim);
  const base=new THREE.Mesh(new THREE.BoxGeometry(8.6,0.5,8.6),new THREE.MeshStandardMaterial({color:0x241826,roughness:.85,metalness:.1}));base.position.y=-0.45;scene.add(base);
  const inlay=new THREE.Mesh(new THREE.BoxGeometry(7.5,0.06,7.5),new THREE.MeshStandardMaterial({color:0x33223a,roughness:.6,emissive:0x1a0f1f}));inlay.position.y=-0.16;scene.add(inlay);
  const pts=ringPositions();pts.forEach((p,i)=>{const cat=MODE_PACK.boardTypes[i],meta=SYMBOLS[cat];
    const mat=new THREE.MeshStandardMaterial({color:meta.color,roughness:.5,metalness:.2});
    const m=new THREE.Mesh(new THREE.BoxGeometry(.94,.22,.94),mat);m.position.set(p[0],0,p[2]);scene.add(m);tiles.push(m);
    const badge=new THREE.Mesh(new THREE.PlaneGeometry(.62,.62),new THREE.MeshBasicMaterial({map:iconBadge(meta.emoji,hex(meta.color)),transparent:true,depthWrite:false,side:THREE.DoubleSide}));
    badge.position.set(p[0],.62,p[2]);badge.userData={baseY:.62,off:i*0.7,pop:0};scene.add(badge);tileIcons.push(badge);});
  [0,1].forEach(i=>{const g=buildToken(i);scene.add(g);tokens.push(g);});
  die=new THREE.Mesh(new THREE.BoxGeometry(.7,.7,.7),new THREE.MeshStandardMaterial({color:0xfff2dc,roughness:.35,metalness:.1}));die.position.set(0,.8,0.1);scene.add(die);
  scene3DReady=true;setupControls(cv);animate();addEventListener('resize',resize);}
function resize(){if(!renderer)return;renderer.setSize(innerWidth,innerHeight);if(camera){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();}}
function tokenTarget(idx){const pts=ringPositions(),p=pts[Engine.state.players[idx].pos],o=idx===0?-0.17:0.17;return new THREE.Vector3(p[0]+o,.1,p[2]+o);}
function placeTokens(instant){if(!scene3DReady||!Engine.state)return;tokens.forEach((t,i)=>{const tg=tokenTarget(i);if(instant){t.position.copy(tg);}else{t.userData.to=tg;t.userData.t=0;}});}
function updateTokenAppearance(){if(!scene3DReady)return;[0,1].forEach(i=>{const e=Profile.data['p'+(i+1)],col=e.color,ud=tokens[i].userData;
  ud.ring.material.color.setHex(col);ud.ring.material.emissive.setHex(col);ud.body.material.color.setHex(col);ud.disc.material.map=avatarTexture(e,hex(col));ud.disc.material.needsUpdate=true;});}
function syncBoard(){if(!scene3DReady||!Engine.state)return;const p0=Engine.state.players[0].pos,p1=Engine.state.players[1].pos;
  if(p0!==lastPos[0]||p1!==lastPos[1]){const moved=lastPos[0]!==-1;placeTokens(!moved);if(moved){dieSpin=18;if(tileIcons[p0])tileIcons[p0].userData.pop=1;if(tileIcons[p1])tileIcons[p1].userData.pop=1;}lastPos=[p0,p1];}}
function animate(){raf=requestAnimationFrame(animate);const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;const tnow=performance.now()*0.001;
  tileIcons.forEach(ic=>{if(camera)ic.quaternion.copy(camera.quaternion);const u=ic.userData;
    if(u.pop>0)u.pop=Math.max(0,u.pop-0.035);const bob=reduce?0:Math.sin(tnow*1.5+u.off)*0.05;const s=1+u.pop*0.45;
    ic.position.y=u.baseY+bob+u.pop*0.22;ic.scale.set(s,s,s);});
  tokens.forEach(t=>{if(t.userData.disc&&camera)t.userData.disc.quaternion.copy(camera.quaternion);
    if(t.userData.to){t.userData.t=Math.min(1,(t.userData.t||0)+(reduce?1:.08));t.position.lerp(t.userData.to,reduce?1:.18);t.position.y=.1+(reduce?0:Math.sin(t.userData.t*Math.PI)*.4);if(t.userData.t>=1){t.position.copy(t.userData.to);t.userData.to=null;}}});
  if(dieSpin>0&&!reduce){die.rotation.x+=.34;die.rotation.y+=.27;dieSpin--;if(dieSpin===0)die.rotation.set(0,0,0);}
  renderer.render(scene,camera);}
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function setupControls(cv){const pts=new Map();let pinch=null;
  cv.addEventListener('pointerdown',e=>{pts.set(e.pointerId,{x:e.clientX,y:e.clientY});try{cv.setPointerCapture(e.pointerId);}catch(_){}if(pts.size===2){const a=[...pts.values()];pinch={d:dist(a[0],a[1]),r:camState.radius};}});
  cv.addEventListener('pointermove',e=>{if(!pts.has(e.pointerId))return;const prev=pts.get(e.pointerId),cur={x:e.clientX,y:e.clientY};
    if(pts.size===1){camState.theta-=(cur.x-prev.x)*0.006;camState.phi=Math.max(0.3,Math.min(1.4,camState.phi-(cur.y-prev.y)*0.006));updateCamera();}
    pts.set(e.pointerId,cur);if(pts.size===2&&pinch){const a=[...pts.values()],d=dist(a[0],a[1]);camState.radius=Math.max(7,Math.min(24,pinch.r*(pinch.d/Math.max(1,d))));updateCamera();}e.preventDefault();},{passive:false});
  const end=e=>{pts.delete(e.pointerId);if(pts.size<2)pinch=null;};cv.addEventListener('pointerup',end);cv.addEventListener('pointercancel',end);}

/* ----------------------------- LÓGICA DE JUEGO (host autoritativo) -------- */
const SC=MODE_PACK.scoring;
function viewForCat(cat){const s=Engine.state;
  switch(cat){
    case 'salida':return {s:'outro',title:'¡Diste la vuelta al tablero!',sub:'+ impulso'};
    case 'premio':Engine.addScore({playerIdx:s.active,sparks:SC.reward.sp,conn:SC.reward.conn});return {s:'outro',title:'🎁 Un regalo del tablero.',sub:`+${SC.reward.sp} Chispas para ${activeName()}`};
    case 'momento':return {s:'connection',q:Engine.drawByCat('connection')||'Mírense y díganse algo lindo.'};
    case 'apuesta':return Content.has('wager')?{s:'wager',q:Engine.drawByCat('wager')||''}:viewForCat('premio');
    case 'reto':return Content.has('playful')?{s:'playful',q:(Engine.drawByCat('playful')||'').replace('{p}',partnerName())}:viewForCat('premio');
    case 'pregunta':default:{const k=['reveal','reveal','match'].filter(c=>Content.has(c));if(!k.length)return viewForCat('premio');
      if(k[Math.floor(Math.random()*k.length)]==='match')return {s:'match',q:Engine.drawByCat('match')||''};
      return {s:'reveal_q',q:(Engine.drawByCat('reveal')||'').replace('{a}',activeName())};}}}
function hostApply(intent,payload,fromIdx){const s=Engine.state;if(!s)return;const v=s.view;
  // sólo el actor correcto puede accionar
  if(actorIdx(v)!==fromIdx && intent!=='again')return;
  switch(intent){
    case 'roll':{const steps=Engine.roll();Engine.advance(steps);s.roll=steps;const pos=s.players[s.active].pos;s.view=viewForCat(pos===0?'salida':Engine.tileCat(pos));break;}
    case 'reveal_ready':s.view={s:'reveal_guess',q:v.q};break;
    case 'guess':s.view={s:'reveal_judge',q:v.q,guess:(payload&&payload.guess)||'(sin respuesta)'};break;
    case 'judge':{const ai=s.active,gi=partnerIdx();const r=payload&&payload.result;
      if(r==='nailed'){Engine.addScore({playerIdx:gi,sparks:SC.reveal.nailed.sp,conn:SC.reveal.nailed.conn});s.view={s:'outro',title:`${s.players[gi].name} conoce a ${s.players[ai].name}.`,sub:`+${SC.reveal.nailed.sp} Chispas · en sintonía`};}
      else if(r==='close'){Engine.addScore({playerIdx:gi,sparks:SC.reveal.close.sp,conn:SC.reveal.close.conn});s.view={s:'outro',title:'¡Por poco!',sub:`+${SC.reveal.close.sp} Chispas`};}
      else{Engine.addScore({playerIdx:ai,sparks:SC.reveal.wayoff.answererSp,conn:SC.reveal.wayoff.conn});s.view={s:'outro',title:`¡${s.players[ai].name} sorprendió!`,sub:`+${SC.reveal.wayoff.answererSp} Chispas por imprevisible`};}break;}
    case 'match':{if(payload&&payload.matched){Engine.addScore({playerIdx:0,sparks:SC.match.sp});Engine.addScore({playerIdx:1,sparks:SC.match.sp,conn:SC.match.conn});s.view={s:'outro',title:'Dos mentes, una respuesta.',sub:`+${SC.match.sp} Chispas para cada uno`};}else{Engine.addScore({conn:3});s.view={s:'outro',title:'Los opuestos se atraen.',sub:'+ un poco de Conexión'};}break;}
    case 'playful':Engine.addScore({playerIdx:s.active,sparks:SC.playful.sp,conn:SC.playful.conn});s.view={s:'outro',title:'De los que se guardan.',sub:`+${SC.playful.sp} Chispas`};break;
    case 'playful_skip':Engine.addScore({conn:3});s.view={s:'outro',title:'Sin presión.',sub:'+ Conexión por intentarlo'};break;
    case 'wager_play':s.view={s:'wager_win',q:v.q};break;
    case 'wager_skip':Engine.addScore({conn:SC.wager_skip.conn});s.view={s:'outro',title:'Se eligieron a ustedes antes que a la apuesta.',sub:'+ Conexión'};break;
    case 'wager_winner':{const i=payload&&payload.idx;Engine.addScore({playerIdx:i,sparks:SC.wager_win.sp,conn:SC.wager_win.conn});s.view={s:'outro',title:`¡${s.players[i].name} se lleva la apuesta!`,sub:`+${SC.wager_win.sp} Chispas`};break;}
    case 'connection_done':Engine.addScore({conn:6});s.view={s:'outro',title:'Eso vale todo.',sub:'+ Conexión'};break;
    case 'continue':if(Engine.checkWin()){s.view={s:'end'};}else{Engine.endTurn();s.view={s:'turn'};}break;
    case 'again':Engine.newGame(Profile.data.p1,Profile.data.p2);break;
  }
  refreshHud();NET.syncState();syncBoard();render();}
function act(intent,payload){if(NET.mode==='local'||NET.role==='host'){hostApply(intent,payload,NET.mode==='local'?actorIdx(Engine.state.view):NET.myIdx);}else{NET.send({t:'intent',intent,payload});}}

function actorIdx(v){if(!v)return Engine.state.active;const a=Engine.state.active,p=a===0?1:0;
  switch(v.s){case 'reveal_guess':case 'playful':return p;default:return a;}}
const panel=document.getElementById('panel'),veil=document.getElementById('veil');
const COLORS=[0xe8717a,0xf4b860,0x8fd6a0,0x6db3c9,0xb89cd9,0xef9bc0];
function hex(n){return '#'+n.toString(16).padStart(6,'0');}

function $(id){return document.getElementById(id);}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function hideHud(){$('hud').style.display='none';$('conn').style.display='none';$('hint').style.display='none';}

const LEGEND=Object.keys(SYMBOLS).filter(k=>k!=='salida').map(k=>`${SYMBOLS[k].emoji} ${SYMBOLS[k].label}`).join(' · ');

  $('n1').textContent=Profile.data.p1.name;$('n2').textContent=Profile.data.p2.name;

function refreshHud(){if(!Engine.state)return;const s=Engine.state;$('sp1').textContent=s.players[0].sparks;$('sp2').textContent=s.players[1].sparks;$('connfill').style.width=s.connection+'%';$('connlbl').textContent=s.connection>=MODE_PACK.win.connectionDeep?'Conexión profunda ♥':'Conexión';}

function render(){const v=Engine.state&&Engine.state.view;if(!v)return;
  if(v.s==='turn'&&Engine.state.turn===0&&Engine.state.players[0].pos===0&&Engine.state.players[1].pos===0)lastPos=[-1,-1];
  syncBoard();
  const local=NET.mode==='local',actor=actorIdx(v),canAct=local||actor===NET.myIdx;
  const actorName=Engine.state.players[actor].name;
  if(v.s!=='reveal_guess')rgPassed=false;
  if(!canAct&&v.s!=='end')return renderWaiting(actorName);
  switch(v.s){
    case 'turn':return renderTurn();
    case 'reveal_q':return renderRevealQ(v);
    case 'reveal_guess':return renderRevealGuess(v,local);
    case 'reveal_judge':return renderRevealJudge(v);
    case 'match':return renderMatch(v);
    case 'playful':return renderPlayful(v);
    case 'wager':return renderWager(v);
    case 'wager_win':return renderWagerWin(v);
    case 'connection':return renderConnection(v);
    case 'outro':return renderOutro(v,local);
    case 'end':return renderEnd();}}

  show(`<div class="card center"><div class="eyebrow">Resumen de la partida</div><div class="spacer"></div>
    <h2 class="display" style="font-size:32px">${deep?'Conexión profunda ♥':'Bien jugado'}</h2>
    <p style="margin-top:10px">${esc(lead)}<br>${deep?'Y juntos llenaron el medidor de Conexión — esa es la verdadera victoria.':'Construyeron '+s.connection+'% de Conexión juntos. Otra ronda y llegan.'}</p>
    <div style="display:flex;gap:12px;margin-top:8px">
      <div class="score" style="flex:1"><div class="nm">${avatarChar(a)} ${esc(a.name)}</div><div class="sp">${a.sparks}</div><div class="spl">Chispas</div></div>
      <div class="score" style="flex:1"><div class="nm">${avatarChar(b)} ${esc(b.name)}</div><div class="sp">${b.sparks}</div><div class="spl">Chispas</div></div></div>
    ${(NET.mode==='local'||NET.myIdx===0)?`<button class="btn" onclick="againGame()">Jugar de nuevo</button>`:`<p class="mini">Esperando que ${esc(a.name)} elija…</p>`}
    <button class="btn ghost" onclick="leaveToStart()">Por hoy listo</button></div>`);}
function againGame(){if(NET.mode==='local'){Engine.newGame(Profile.data.p1,Profile.data.p2);lastPos=[-1,-1];showHud();refreshHud();syncBoard();render();}
  else{act('again');showHud();}}
function leaveToStart(){NET.reset();hideHud();screenStart();}

/* ----------------------------- PANTALLAS / SETUP ------------------------- */
function screenStart(){hideHud();
  show(`<div class="card center"><div class="eyebrow">Un juego de NOVA FORGE STUDIO</div><div class="spacer"></div>
    <h1 class="display">Corazones<br>y Apuestas</h1>
    <p style="margin-top:14px">Un juego de mesa para dos. Avancen, revelen, adivinen — y descubran cuánto se conocen.</p>
    <button class="btn" onclick="screenSetupLocal()">Un solo teléfono</button>
    <button class="btn" onclick="screenOnline()">Dos teléfonos</button>
    <button class="btn ghost" onclick="screenEditor()">Personalizar preguntas</button>
  </div>`);}

function colorRow(getC,setFn){return COLORS.map(c=>`<div class="sw ${c===getC?'sel':''}" style="background:${hex(c)}" onclick="${setFn}(${c})"></div>`).join('');}
function avatarRow(cur,emojiFn,photoFn){const emos=AVATAR_EMOJIS.map(e=>`<div class="sw ${cur&&cur.type==='emoji'&&cur.value===e?'sel':''}" style="display:flex;align-items:center;justify-content:center;font-size:19px;background:#211824" onclick="${emojiFn}('${e}')">${e}</div>`).join('');
  const ph=cur&&cur.type==='photo';return `<div class="swatches">${emos}<div class="sw ${ph?'sel':''}" style="${ph?avatarBg({avatar:cur}):''};display:flex;align-items:center;justify-content:center;background:#211824" onclick="${photoFn}()">${ph?'':'📷'}</div></div>`;}

/* --- modo local: dos perfiles --- */
function screenSetupLocal(){const d=Profile.data;
  show(`<div class="card"><div class="eyebrow">Un solo teléfono</div><div class="spacer"></div>
    <h2 class="display" style="font-size:26px">Solo ustedes dos</h2>
    <input class="field" id="in1" placeholder="Nombre del primer jugador" value="${esc(d.p1.name)}">
    <div class="lbl">Color</div><div class="swatches">${colorRow(d.p1.color,'setColLocal1')}</div>
    <div class="lbl">Avatar</div>${avatarRow(d.p1.avatar,'setEmoLocal1','photoLocal1')}
    <div style="height:14px"></div>
    <input class="field" id="in2" placeholder="Nombre del segundo jugador" value="${esc(d.p2.name)}">
    <div class="lbl">Color</div><div class="swatches">${colorRow(d.p2.color,'setColLocal2')}</div>
    <div class="lbl">Avatar</div>${avatarRow(d.p2.avatar,'setEmoLocal2','photoLocal2')}
    <button class="btn" onclick="startLocal()">Armar el tablero</button>
    <button class="btn ghost" onclick="screenStart()">Volver</button></div>`);}
function saveLocalNames(){if($('in1'))Profile.data.p1.name=$('in1').value;if($('in2'))Profile.data.p2.name=$('in2').value;}
function setColLocal1(c){saveLocalNames();Profile.data.p1.color=c;screenSetupLocal();}
function setColLocal2(c){saveLocalNames();Profile.data.p2.color=c;screenSetupLocal();}
function setEmoLocal1(e){saveLocalNames();Profile.data.p1.avatar={type:'emoji',value:e};Profile.save();screenSetupLocal();}
function setEmoLocal2(e){saveLocalNames();Profile.data.p2.avatar={type:'emoji',value:e};Profile.save();screenSetupLocal();}
function photoLocal1(){saveLocalNames();pickPhoto(a=>{Profile.data.p1.avatar=a;Profile.save();screenSetupLocal();});}
function photoLocal2(){saveLocalNames();pickPhoto(a=>{Profile.data.p2.avatar=a;Profile.save();screenSetupLocal();});}
function startLocal(){saveLocalNames();NET.reset();Profile.data.p1.name=Profile.data.p1.name.trim()||"Jugador 1";Profile.data.p2.name=Profile.data.p2.name.trim()||"Jugador 2";Profile.save();
  Engine.newGame(Profile.data.p1,Profile.data.p2);lastPos=[-1,-1];onGameReady();render();}

/* --- modo online: un perfil (yo) --- */
function pickPhoto(cb){const inp=document.createElement('input');inp.type='file';inp.accept='image/*';
  inp.onchange=()=>{const f=inp.files&&inp.files[0];if(!f)return;const fr=new FileReader();fr.onload=()=>downscale(fr.result,256,d=>cb({type:'photo',value:d}));fr.readAsDataURL(f);};inp.click();}
function downscale(dataURL,max,cb){const img=new Image();img.onload=()=>{const s=Math.min(1,max/Math.max(img.width,img.height)),w=Math.round(img.width*s),h=Math.round(img.height*s),c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);try{cb(c.toDataURL('image/jpeg',0.85));}catch(e){cb(dataURL);}};img.src=dataURL;}
function screenOnline(){if(!NET.available()){show(`<div class="card center"><div class="tag">Dos teléfonos</div>
    <h3 class="prompt">No se pudo cargar el modo en red</h3><p>Tu conexión bloqueó la librería necesaria. Probá con datos móviles, o usá el modo de un solo teléfono.</p>
    <button class="btn" onclick="screenSetupLocal()">Un solo teléfono</button><button class="btn ghost" onclick="screenStart()">Volver</button></div>`);return;}
  show(`<div class="card center"><div class="eyebrow">Dos teléfonos</div><div class="spacer"></div>
    <h2 class="display" style="font-size:26px">Cada uno en el suyo</h2>
    <p>Uno crea la sala y le pasa el código al otro. Misma modalidad, pero ya no hace falta pasarse el teléfono.</p>
    <button class="btn" onclick="screenMe('host')">Crear sala</button>
    <button class="btn" onclick="screenMe('guest')">Unirme a una sala</button>
    <button class="btn ghost" onclick="screenStart()">Volver</button></div>`);}
function screenMe(role){NET._pendingRole=role;const m=Profile.me;
  show(`<div class="card"><div class="eyebrow">${role==='host'?'Crear sala':'Unirme'}</div><div class="spacer"></div>
    <h2 class="display" style="font-size:26px">Tu perfil</h2>
    <input class="field" id="meName" placeholder="Tu nombre" value="${esc(m.name)}">
    <div class="lbl">Color</div><div class="swatches">${colorRow(m.color,'setColMe')}</div>
    <div class="lbl">Avatar</div>${avatarRow(m.avatar,'setEmoMe','photoMe')}
    ${role==='guest'?`<div class="lbl">Código de la sala</div><input class="field" id="roomCode" placeholder="ABCD" maxlength="4" style="text-transform:uppercase;letter-spacing:.2em">`:''}
    <button class="btn" onclick="${role==='host'?'goHost()':'goGuest()'}">${role==='host'?'Crear sala':'Conectar'}</button>
    <button class="btn ghost" onclick="screenOnline()">Volver</button></div>`);}
function saveMeName(){if($('meName'))Profile.me.name=$('meName').value;}
function setColMe(c){saveMeName();Profile.me.color=c;screenMe(NET._pendingRole||'host');}
function setEmoMe(e){saveMeName();Profile.me.avatar={type:'emoji',value:e};Profile.save();screenMe(NET._pendingRole||'host');}
function photoMe(){saveMeName();pickPhoto(a=>{Profile.me.avatar=a;Profile.save();screenMe(NET._pendingRole||'host');});}
function _track(role){NET._pendingRole=role;}
function goHost(){saveMeName();Profile.me.name=Profile.me.name.trim()||"Yo";Profile.save();NET._pendingRole='host';
  NET.startHost((st,info)=>{
    if(st==='waiting'){show(`<div class="card center"><div class="eyebrow">Sala creada</div>
      <p style="margin-top:8px">Pasale este código al otro teléfono:</p><div class="code">${NET.code}</div>
      <div class="wait"><div class="pulse"></div><p>Esperando que se una…</p></div>
      <button class="btn ghost" onclick="leaveToStart()">Cancelar</button></div>`);}
    else if(st==='error'){show(`<div class="card center"><h3 class="prompt">No se pudo crear la sala</h3><p>${esc(info||'')}. Probá de nuevo o usá un solo teléfono.</p><button class="btn" onclick="screenOnline()">Reintentar</button><button class="btn ghost" onclick="screenSetupLocal()">Un solo teléfono</button></div>`);}
  });}
function goGuest(){saveMeName();Profile.me.name=Profile.me.name.trim()||"Yo";const code=($('roomCode')?.value||'').trim().toUpperCase();
  if(code.length<4){$('roomCode').focus();return;}Profile.save();NET._pendingRole='guest';
  show(`<div class="card center"><div class="eyebrow">Conectando…</div><div class="wait" style="margin-top:14px"><div class="pulse"></div><p>Buscando la sala ${esc(code)}…</p></div></div>`);
  NET.startGuest(code,(st,info)=>{
    if(st==='error'){show(`<div class="card center"><h3 class="prompt">No me pude conectar</h3><p>Revisá el código (${esc(code)}) o probá de nuevo. ${esc(info||'')}</p><button class="btn" onclick="screenMe('guest')">Reintentar</button><button class="btn ghost" onclick="screenSetupLocal()">Un solo teléfono</button></div>`);}
  });}

/* ----------------------------- EDITOR ------------------------------------ */
let ed={form:false,cat:'reveal',editId:null,fromGame:false};
function screenEditor(){hideHud();let rows='';
  Object.keys(CAT_LABEL).forEach(cat=>{const items=Content.byCat(cat);
    rows+=`<div class="ed-cat">${CAT_LABEL[cat]} <span class="h">· ${Content.enabled(cat).length}/${items.length} activas</span></div>`;
    if(!items.length)rows+=`<p style="margin:4px 0">Sin preguntas.</p>`;
    items.forEach(it=>{rows+=`<div class="ed-row ${it.enabled?'':'off'}"><button class="chk ${it.enabled?'on':''}" onclick="edToggle('${it.id}')">${it.enabled?'✓':''}</button><div class="tx">${esc(it.text)}</div><button class="ico" onclick="edEdit('${it.id}')">✎</button><button class="ico" onclick="edDelete('${it.id}')">🗑</button></div>`;});});
  show(`<div class="card"><div class="toprow"><div class="eyebrow">Personalizar preguntas</div>
    <button class="btn ghost sm" onclick="${ed.fromGame?'backToGameFromEditor()':'screenStart()'}">${ed.fromGame?'Volver':'Listo'}</button></div>
    <p style="margin-top:8px">Tocá ✓ para elegir cuáles entran. Editá ✎, borrá 🗑, o agregá las tuyas. Se guardan en este teléfono.</p>
    ${ed.form?editorForm():`<button class="btn" onclick="edOpenForm()">+ Agregar pregunta</button>`}
    <div class="ed-scroll">${rows}</div>
    <button class="btn ghost" style="margin-top:14px" onclick="screenExport()">Respaldar / Importar</button>
    <button class="btn ghost" onclick="edReset()">Restaurar preguntas originales</button>
    ${storageOK?'':'<div class="mini" style="color:var(--rose)">Este navegador no permite guardar; los cambios durarán solo esta sesión.</div>'}</div>`);}
function editorForm(){const opts=Object.keys(CAT_LABEL).map(c=>`<option value="${c}" ${c===ed.cat?'selected':''}>${CAT_LABEL[c]}</option>`).join('');const cur=ed.editId?Content.items.find(i=>i.id===ed.editId):null;
  return `<div style="border:1px solid var(--line);border-radius:16px;padding:14px;margin-top:6px"><div class="eyebrow">${ed.editId?'Editar':'Nueva'}</div>
    <select class="field" id="edCat" onchange="ed.cat=this.value;edHelp()" ${ed.editId?'disabled':''}>${opts}</select>
    <div class="mini" id="edHelp" style="margin-top:6px">${CAT_HELP[cur?cur.cat:ed.cat]}</div>
    <textarea class="field" id="edText" placeholder="Escribí la pregunta o el reto…">${cur?esc(cur.text):''}</textarea>
    <div style="display:flex;gap:10px"><button class="btn" onclick="edSave()">Guardar</button><button class="btn ghost" onclick="edCancel()">Cancelar</button></div></div>`;}
function edHelp(){const h=$('edHelp');if(h)h.textContent=CAT_HELP[$('edCat').value];}
function edOpenForm(){ed.form=true;ed.editId=null;ed.cat='reveal';screenEditor();}
function edEdit(id){const it=Content.items.find(i=>i.id===id);if(!it)return;ed.form=true;ed.editId=id;ed.cat=it.cat;screenEditor();}
function edSave(){const t=($('edText')?.value||'').trim();if(!t){$('edText').focus();return;}if(ed.editId)Content.edit(ed.editId,t);else Content.add($('edCat').value,t);ed.form=false;ed.editId=null;screenEditor();}
function edCancel(){ed.form=false;ed.editId=null;screenEditor();}
function edToggle(id){Content.toggle(id);screenEditor();}
function edDelete(id){Content.remove(id);if(ed.editId===id){ed.form=false;ed.editId=null;}screenEditor();}
function edReset(){if(confirm('¿Restaurar las preguntas originales? Se quitan las que agregaste.')){Content.reset();ed.form=false;screenEditor();}}
function backToGameFromEditor(){ed.fromGame=false;showHud();render();}
function screenExport(){const json=JSON.stringify({items:Content.items});
  show(`<div class="card"><div class="toprow"><div class="eyebrow">Respaldar / Importar</div><button class="btn ghost sm" onclick="screenEditor()">Volver</button></div>
    <p style="margin-top:8px">Copiá este texto para guardar tus preguntas, o pegá uno para importarlas.</p>
    <textarea class="field" id="expText" style="min-height:120px;font-size:13px">${esc(json)}</textarea>
    <button class="btn" onclick="copyExport()">Copiar</button><button class="btn ghost" onclick="importContent()">Importar desde el texto</button></div>`);}
function copyExport(){const t=$('expText');t.select();try{navigator.clipboard.writeText(t.value);alert('Copiado ✓');}catch(e){try{document.execCommand('copy');alert('Copiado ✓');}catch(_){alert('Seleccioná el texto y copialo a mano.');}}}
function importContent(){try{const o=JSON.parse($('expText').value);if(o&&Array.isArray(o.items)&&o.items.length){Content.items=o.items.map(i=>({enabled:true,custom:true,...i}));Content.save();alert('Importado ✓');screenEditor();}else alert('Texto sin preguntas válidas.');}catch(e){alert('No pude leer ese texto.');}}

/* ----------------------------- ARRANQUE ---------------------------------- */
function boot3D(){try{initScene();}catch(e){console.warn('3D no arrancó; corre igual.',e);}}
window.addEventListener('load',()=>{Content.load();Profile.load();screenStart();
  if(typeof THREE!=='undefined'){boot3D();}else{const s=document.createElement('script');s.src='https://unpkg.com/three@0.128.0/build/three.min.js';s.onload=boot3D;s.onerror=()=>console.warn('Sin 3D en esta red.');document.head.appendChild(s);}});
</script>
</body>
</html>
