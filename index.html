<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Heart &amp; Stakes — NOVA FORGE STUDIO (Prototype)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root{
    --night-1:#1a1320; --night-2:#2a1d2e; --surface:#2d2230; --surface-2:#3a2c3e;
    --glow:#f4b860; --glow-soft:#ffd9a0; --rose:#e8717a; --teal:#6db3c9;
    --text:#f5ece4; --muted:#b9a8b0; --line:rgba(244,184,96,.18);
    --p1:#e8717a; --p2:#6db3c9;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:"DM Sans",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    color:var(--text);
    background:radial-gradient(120% 120% at 50% 0%, #2a1d2e 0%, #1a1320 55%, #120c16 100%);
    overflow:hidden; position:fixed; inset:0; touch-action:manipulation;
  }
  #scene{position:fixed; inset:0; z-index:0;}
  #ui{position:fixed; inset:0; z-index:2; display:flex; flex-direction:column;
      align-items:center; justify-content:center; padding:22px; pointer-events:none;}
  .panel{pointer-events:auto; width:100%; max-width:440px;}
  h1,h2,h3{font-family:"Fraunces",Georgia,serif; font-weight:500; margin:0; line-height:1.08;}
  .display{font-size:clamp(34px,9vw,52px); letter-spacing:-.01em;}
  .eyebrow{font-size:12px; letter-spacing:.22em; text-transform:uppercase; color:var(--glow);
    font-weight:700; font-family:"DM Sans";}
  p{color:var(--muted); line-height:1.5; font-size:15px;}
  .card{
    background:linear-gradient(180deg, var(--surface) 0%, #271c2b 100%);
    border:1px solid var(--line); border-radius:24px; padding:26px 24px;
    box-shadow:0 30px 80px -30px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.04);
    backdrop-filter:blur(6px); animation:rise .45s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes rise{from{opacity:0; transform:translateY(14px) scale(.98);} to{opacity:1; transform:none;}}
  .btn{
    pointer-events:auto; display:block; width:100%; border:none; cursor:pointer;
    font-family:"DM Sans"; font-weight:700; font-size:16px; padding:16px 20px;
    border-radius:16px; margin-top:12px; color:#241a14; transition:transform .12s, filter .2s;
    background:linear-gradient(180deg, var(--glow-soft), var(--glow));
    box-shadow:0 10px 24px -8px rgba(244,184,96,.5);
  }
  .btn:active{transform:translateY(1px) scale(.99);}
  .btn.ghost{background:transparent; color:var(--text); border:1px solid var(--line);
    box-shadow:none; font-weight:500;}
  .btn.ghost:active{filter:brightness(1.2);}
  .row{display:flex; gap:10px;} .row .btn{margin-top:12px;}
  .field{width:100%; background:#211824; border:1px solid var(--line); color:var(--text);
    border-radius:14px; padding:14px 16px; font-family:"DM Sans"; font-size:16px; margin-top:10px;}
  .field:focus{outline:none; border-color:var(--glow);}
  .swatches{display:flex; gap:10px; margin-top:10px; flex-wrap:wrap;}
  .sw{width:34px; height:34px; border-radius:50%; cursor:pointer; border:2px solid transparent;}
  .sw.sel{border-color:var(--text); transform:scale(1.12);}
  .who{font-family:"Fraunces"; font-size:13px; letter-spacing:.04em;}
  .tag{display:inline-block; font-size:11px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--glow); font-weight:700; margin-bottom:14px;}
  .prompt{font-family:"Fraunces"; font-size:clamp(22px,6vw,28px); line-height:1.22; margin:6px 0 4px;}
  /* HUD */
  #hud{position:fixed; top:0; left:0; right:0; z-index:3; padding:14px 16px;
    display:none; gap:12px; align-items:center; pointer-events:none;}
  .score{flex:1; background:rgba(20,14,22,.55); border:1px solid var(--line);
    border-radius:14px; padding:8px 12px; backdrop-filter:blur(8px);}
  .score .nm{font-size:12px; color:var(--muted); display:flex; align-items:center; gap:6px;}
  .dot{width:9px; height:9px; border-radius:50%;}
  .score .sp{font-family:"Fraunces"; font-size:22px;}
  #conn{position:fixed; bottom:0; left:0; right:0; z-index:3; padding:12px 16px 18px;
    display:none; pointer-events:none;}
  .connbar{height:12px; border-radius:8px; background:rgba(20,14,22,.6);
    border:1px solid var(--line); overflow:hidden;}
  .connfill{height:100%; width:0%; border-radius:8px;
    background:linear-gradient(90deg,var(--rose),var(--glow)); transition:width .6s cubic-bezier(.2,.8,.2,1);}
  .connlbl{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted);
    text-align:center; margin-bottom:6px;}
  /* Blind pass veil */
  #veil{position:fixed; inset:0; z-index:5; display:none; flex-direction:column;
    align-items:center; justify-content:center; padding:30px; text-align:center;
    background:radial-gradient(80% 60% at 50% 45%, #2a1d2e, #120c16);}
  .seal{width:108px; height:108px; border-radius:50%; margin-bottom:22px;
    background:radial-gradient(circle at 35% 30%, var(--glow-soft), var(--glow) 60%, #c98a2e);
    box-shadow:0 16px 50px -10px rgba(244,184,96,.5); display:flex; align-items:center;
    justify-content:center; font-size:46px; animation:pulse 2.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
  .mini{font-size:13px; color:var(--muted); margin-top:18px;}
  .center{text-align:center;}
  .spacer{height:10px;}
  .foottag{position:fixed; bottom:6px; left:0; right:0; text-align:center; z-index:1;
    font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:rgba(185,168,176,.4);}
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important;}
  }
</style>
</head>
<body>
  <canvas id="scene"></canvas>

  <div id="hud">
    <div class="score" id="s1"><div class="nm"><span class="dot" id="d1"></span><span id="n1">P1</span></div><div class="sp" id="sp1">0</div></div>
    <div class="score" id="s2"><div class="nm"><span class="dot" id="d2"></span><span id="n2">P2</span></div><div class="sp" id="sp2">0</div></div>
  </div>

  <div id="conn">
    <div class="connlbl" id="connlbl">Connection</div>
    <div class="connbar"><div class="connfill" id="connfill"></div></div>
  </div>

  <div id="ui"><div class="panel" id="panel"></div></div>

  <div id="veil">
    <div class="seal">🤫</div>
    <h2 class="display" id="veilTitle">Keep it secret</h2>
    <p id="veilText" style="max-width:320px;"></p>
    <button class="btn" id="veilBtn" style="max-width:320px;">I have the phone</button>
    <div class="mini">Hand the device over before tapping.</div>
  </div>

  <div class="foottag">NOVA FORGE STUDIO · core-loop prototype</div>

<script>
/* =========================================================================
   HEART & STAKES — Core-loop prototype
   NOVA FORGE STUDIO · COUPLES BOARD GAME (working title)

   This single file is a deliberate miniature of the GDD's engine/content
   split (GDD §4). The ENGINE block knows how to run a board/turn/prompt/
   score/win. The MODE PACK block is pure content (board, decks, theme,
   scoring + win config). Swapping the MODE PACK would change the game
   without touching the engine — the platform thesis in miniature.
   ========================================================================= */

/* ----------------------------- MODE PACK (content) ----------------------- */
const MODE_PACK = {
  id: "couples-challenge",
  name: "Heart & Stakes",
  scoring: { reveal:{nailed:{sp:3,conn:14}, close:{sp:2,conn:9}, wayoff:{answererSp:3,conn:5}},
             match:{sp:1,conn:8}, playful:{sp:2,conn:7}, reward:{sp:2,conn:4},
             wager_win:{sp:3,conn:6}, wager_skip:{conn:3} },
  win: { lapsToGoal:1, connectionDeep:60, turnCap:18 },
  // 16-tile ring; index 0 is start/goal. Types pace the session (GDD §5.3).
  boardTypes: ["start","prompt","prompt","reward","prompt","safe","prompt","wager",
               "prompt","prompt","reward","prompt","safe","prompt","wager","prompt"],
  decks: {
    reveal: [
      "{a}, what would be your perfect lazy Sunday?",
      "{a}, if we could teleport anywhere right now, where would you go?",
      "{a}, what's a tiny thing that always makes your day better?",
      "{a}, what's secretly your comfort song?",
      "{a}, what's your go-to order at a café?",
      "{a}, which fictional world would you most want to live in?",
      "{a}, what's the first thing you'd buy if money didn't matter?",
      "{a}, what food could you happily eat every single day?",
      "{a}, what's your idea of a perfect date night?",
      "{a}, what's something you're weirdly good at?",
      "{a}, what's your most-used emoji?",
      "{a}, what's a small thing you're proud of this week?"
    ],
    match: [
      "Mountains or ocean?","Early bird or night owl?","Sweet or savory?",
      "Plan everything or go with the flow?","Big party or quiet night in?",
      "Texts or calls?","Sunrise or sunset?","Cook in or eat out?"
    ],
    playful: [
      "Give {p} a 10-second hype speech.",
      "Do your best impression of {p} ordering coffee.",
      "Describe {p} using only movie titles.",
      "Pay {p} a compliment they've never heard from you before.",
      "Recreate the face you made on your first date."
    ],
    connection: [
      "Tell each other one thing you're grateful for today.",
      "Share a memory of you two that always makes you smile.",
      "Name one thing you're looking forward to doing together.",
      "Look up from the phone and say one nice thing — out loud."
    ],
    wager: [
      "10-second staring contest. Loser makes the next snack.",
      "Whoever laughs first does the other's chosen silly dance.",
      "Rock-paper-scissors — winner picks the next song."
    ]
  }
};

/* ----------------------------- ENGINE (reusable) ------------------------- */
const Engine = {
  state:null,
  newGame(p1,p2,pack){
    this.state = {
      pack,
      players:[ {name:p1.name||"Player 1", color:p1.color, sparks:0, pos:0, laps:0},
                {name:p2.name||"Player 2", color:p2.color, sparks:0, pos:0, laps:0} ],
      connection:0, active:0, turn:0, phase:"turn_intro", deckIdx:{}
    };
    return this.state;
  },
  roll(){ return 1 + Math.floor(Math.random()*3); },           // advancement: die 1–3
  drawFrom(key){
    const s=this.state, deck=s.pack.decks[key];
    s.deckIdx[key] = (s.deckIdx[key]||0);
    // shuffle-on-exhaust, otherwise sequential so a session doesn't repeat
    if(s.deckIdx[key]===0) deck._order = shuffle([...deck.keys()]);
    const idx = deck._order[s.deckIdx[key] % deck.length];
    s.deckIdx[key] = (s.deckIdx[key]+1);
    return deck[idx];
  },
  tileType(pos){ return this.state.pack.boardTypes[pos % this.state.pack.boardTypes.length]; },
  advance(steps){
    const s=this.state, p=s.players[s.active], n=s.pack.boardTypes.length;
    for(let i=0;i<steps;i++){ p.pos=(p.pos+1)%n; if(p.pos===0) p.laps++; }
    return p.pos;
  },
  addScore({playerIdx=null, sparks=0, conn=0}={}){
    const s=this.state;
    if(playerIdx!==null) s.players[playerIdx].sparks += sparks;
    s.connection = Math.min(100, s.connection + conn);
  },
  checkWin(){
    const s=this.state, w=s.pack.win;
    const lapDone = s.players.some(p=>p.laps>=w.lapsToGoal);
    const capped = s.turn>=w.turnCap;
    return lapDone || capped;
  },
  endTurn(){ const s=this.state; s.active = s.active===0?1:0; s.turn++; }
};
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ----------------------------- 3D BOARD (presentation) ------------------- */
let renderer, scene, camera, tiles=[], tokens=[], die, dieSpin=0, raf;
const TYPE_COLOR = { start:0xf4b860, prompt:0xf4b860, reward:0x8fd6a0,
                     safe:0x8fb8e0, wager:0xe8717a, goal:0xffe2a8 };
function ringPositions(){
  // 5x5 grid perimeter -> 16 ordered points, clockwise from top-left
  const N=5, gap=1.32, pts=[], off=(N-1)/2;
  const ring=[];
  for(let c=0;c<N;c++) ring.push([0,c]);            // top row L→R
  for(let r=1;r<N;r++) ring.push([r,N-1]);          // right col
  for(let c=N-2;c>=0;c--) ring.push([N-1,c]);       // bottom row R→L
  for(let r=N-2;r>=1;r--) ring.push([r,0]);         // left col
  ring.forEach(([r,c])=>pts.push([ (c-off)*gap, 0, (r-off)*gap ]));
  return pts; // 16 points
}
function initScene(){
  const cv=document.getElementById('scene');
  renderer=new THREE.WebGLRenderer({canvas:cv, antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  resize();
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 100);
  camera.position.set(0,7.4,6.2); camera.lookAt(0,0,0.2);

  scene.add(new THREE.AmbientLight(0xffe7c4, .55));
  const key=new THREE.PointLight(0xffd9a0, 1.5, 40); key.position.set(0,7,2.5); scene.add(key);
  const rim=new THREE.DirectionalLight(0x6db3c9,.5); rim.position.set(-4,3,-5); scene.add(rim);

  // board base
  const base=new THREE.Mesh(new THREE.BoxGeometry(8.4,0.5,8.4),
    new THREE.MeshStandardMaterial({color:0x241826, roughness:.85, metalness:.1}));
  base.position.y=-0.45; scene.add(base);
  const inlay=new THREE.Mesh(new THREE.BoxGeometry(7.4,0.06,7.4),
    new THREE.MeshStandardMaterial({color:0x33223a, roughness:.6, emissive:0x1a0f1f}));
  inlay.position.y=-0.16; scene.add(inlay);

  // tiles
  const pts=ringPositions();
  pts.forEach((p,i)=>{
    const type=MODE_PACK.boardTypes[i];
    const m=new THREE.Mesh(new THREE.BoxGeometry(.92,.18,.92),
      new THREE.MeshStandardMaterial({color:TYPE_COLOR[type]||0xf4b860,
        roughness:.4, metalness:.2, emissive:0x000000}));
    m.position.set(p[0],0,p[2]); m.userData={base:TYPE_COLOR[type]||0xf4b860};
    scene.add(m); tiles.push(m);
  });

  // tokens
  [0,1].forEach(i=>{
    const g=new THREE.Group();
    const col=i===0?0xe8717a:0x6db3c9;
    const stem=new THREE.Mesh(new THREE.CylinderGeometry(.16,.22,.34,20),
      new THREE.MeshStandardMaterial({color:col, roughness:.3, metalness:.3}));
    const head=new THREE.Mesh(new THREE.SphereGeometry(.2,24,18),
      new THREE.MeshStandardMaterial({color:col, roughness:.25, metalness:.35, emissive:col, emissiveIntensity:.15}));
    head.position.y=.32; g.add(stem); g.add(head); g.position.y=.22;
    scene.add(g); tokens.push(g);
  });

  // die
  die=new THREE.Mesh(new THREE.BoxGeometry(.7,.7,.7),
    new THREE.MeshStandardMaterial({color:0xfff2dc, roughness:.35, metalness:.1}));
  die.position.set(0,.7,0.1); scene.add(die);

  placeTokens(true);
  animate();
  addEventListener('resize', resize);
}
function resize(){ renderer.setSize(innerWidth,innerHeight);
  if(camera){camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();} }
function tokenTarget(idx){
  const pts=ringPositions(), p=pts[Engine.state.players[idx].pos];
  // small offset so two tokens on same tile don't overlap
  const o = idx===0? -0.16: 0.16;
  return new THREE.Vector3(p[0]+o, .22, p[2]+o);
}
function placeTokens(instant){
  tokens.forEach((t,i)=>{ const tg=tokenTarget(i);
    if(instant){t.position.copy(tg);} else {t.userData.to=tg; t.userData.t=0;} });
}
function animate(){
  raf=requestAnimationFrame(animate);
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  tokens.forEach(t=>{
    if(t.userData.to){
      t.userData.t=Math.min(1,(t.userData.t||0)+(reduce?1:.08));
      t.position.lerp(t.userData.to, reduce?1:.18);
      t.position.y = .22 + (reduce?0:Math.sin(t.userData.t*Math.PI)*.35);
      if(t.userData.t>=1){t.position.copy(t.userData.to); t.userData.to=null;}
    }
  });
  if(dieSpin>0 && !reduce){ die.rotation.x+=.34; die.rotation.y+=.27; dieSpin--; if(dieSpin===0) die.rotation.set(0,0,0); }
  renderer.render(scene,camera);
}
function pulseTile(pos){
  const m=tiles[pos]; if(!m) return; m.material.emissive.setHex(0x5a3a12);
  setTimeout(()=>m.material.emissive.setHex(0x000000),900);
}

/* ----------------------------- UI / FLOW --------------------------------- */
const panel=document.getElementById('panel');
const veil=document.getElementById('veil');
let setup={ p1:{name:"",color:0xe8717a}, p2:{name:"",color:0x6db3c9} };
const COLORS=[0xe8717a,0xf4b860,0x8fd6a0,0x6db3c9,0xb89cd9,0xef9bc0];

function hex(n){return '#'+n.toString(16).padStart(6,'0');}
function show(html){ panel.innerHTML=html; }
function $(id){return document.getElementById(id);}

function screenStart(){
  document.getElementById('hud').style.display='none';
  document.getElementById('conn').style.display='none';
  show(`
    <div class="card center">
      <div class="eyebrow">A NOVA FORGE STUDIO game</div>
      <div class="spacer"></div>
      <h1 class="display">Heart<br>&amp; Stakes</h1>
      <p style="margin-top:14px">A cosy board game for two, on one device.
      Move, reveal, guess — and find out how well you really know each other.</p>
      <button class="btn" onclick="screenSetup()">Begin</button>
      <div class="mini" style="margin-top:14px">Pass the phone when it asks. Loser still wins a hug.</div>
    </div>`);
}
function screenSetup(){
  const sw=(who,sel)=>COLORS.map(c=>`<div class="sw ${c===sel?'sel':''}"
      style="background:${hex(c)}" onclick="pickColor('${who}',${c})"></div>`).join('');
  show(`
    <div class="card">
      <div class="eyebrow">Who's playing</div>
      <div class="spacer"></div>
      <h2 class="display" style="font-size:30px">Just the two of you</h2>
      <input class="field" id="in1" placeholder="First player's name" value="${setup.p1.name}">
      <div class="swatches" id="swA">${sw('p1',setup.p1.color)}</div>
      <div style="height:14px"></div>
      <input class="field" id="in2" placeholder="Second player's name" value="${setup.p2.name}">
      <div class="swatches" id="swB">${sw('p2',setup.p2.color)}</div>
      <button class="btn" onclick="startGame()">Set up the board</button>
      <button class="btn ghost" onclick="quickStart()">Quick start (skip names)</button>
    </div>`);
}
function pickColor(who,c){ setup[who].color=c;
  // keep typed names while re-rendering swatches
  setup.p1.name=$('in1')?.value||setup.p1.name; setup.p2.name=$('in2')?.value||setup.p2.name;
  screenSetup(); }
function quickStart(){ setup.p1.name="Player 1"; setup.p2.name="Player 2"; startGame(); }
function startGame(){
  setup.p1.name=$('in1')?.value.trim()||"Player 1";
  setup.p2.name=$('in2')?.value.trim()||"Player 2";
  Engine.newGame(setup.p1,setup.p2,MODE_PACK);
  // recolor tokens + hud to chosen colors
  tokens[0].children.forEach(m=>m.material.color.setHex(setup.p1.color));
  tokens[1].children.forEach(m=>m.material.color.setHex(setup.p2.color));
  $('d1').style.background=hex(setup.p1.color); $('d2').style.background=hex(setup.p2.color);
  $('n1').textContent=setup.p1.name; $('n2').textContent=setup.p2.name;
  document.getElementById('hud').style.display='flex';
  document.getElementById('conn').style.display='block';
  refreshHud(); turnIntro();
}
function refreshHud(){
  const s=Engine.state;
  $('sp1').textContent=s.players[0].sparks; $('sp2').textContent=s.players[1].sparks;
  $('connfill').style.width=s.connection+'%';
  $('connlbl').textContent = s.connection>=MODE_PACK.win.connectionDeep ? 'Deep Connection ♥' : 'Connection';
}
function activeName(){return Engine.state.players[Engine.state.active].name;}
function partnerName(){return Engine.state.players[Engine.state.active===0?1:0].name;}

function turnIntro(){
  const s=Engine.state, p=s.players[s.active];
  show(`
    <div class="card center">
      <div class="who" style="color:${hex(p.color)}">${p.name}'s turn</div>
      <h2 class="display" style="font-size:30px; margin-top:6px">Your roll</h2>
      <p>Tap to send your piece around the board.</p>
      <button class="btn" onclick="doRoll()">Roll the die</button>
    </div>`);
}
function doRoll(){
  const steps=Engine.roll(); dieSpin=22;
  show(`<div class="card center"><div class="eyebrow">Rolling…</div>
    <h2 class="display" style="font-size:64px; margin-top:8px">${steps}</h2></div>`);
  setTimeout(()=>{ Engine.advance(steps); placeTokens(false);
    setTimeout(()=>resolveTile(), 700); }, 650);
}
function resolveTile(){
  const s=Engine.state, p=s.players[s.active];
  pulseTile(p.pos);
  const type = p.pos===0 ? 'goal' : Engine.tileType(p.pos);
  if(type==='goal'){ s.turn++; if(Engine.checkWin()) return screenEnd(); afterResolve('You rounded the board!','+ a little momentum',()=>{}); return; }
  if(type==='reward')  return resolveReward();
  if(type==='safe')    return resolveConnection();
  if(type==='wager')   return resolveWager();
  return resolvePrompt(); // 'prompt' / 'start'
}

/* ---- prompt tile: mix of reveal&guess, this-or-that, playful ---- */
function resolvePrompt(){
  const kinds=['reveal','reveal','match','playful']; // reveal weighted (it's the signature)
  const k=kinds[Math.floor(Math.random()*kinds.length)];
  if(k==='reveal') return revealIntro();
  if(k==='match')  return matchCard();
  return playfulCard();
}

/* ---- SIGNATURE: Reveal & Guess with blind pass (GDD §5.6, fixes QA-crit-1) ---- */
let rg={};
function revealIntro(){
  const s=Engine.state;
  const answerer=activeName(), guesser=partnerName();
  const q=Engine.drawFrom('reveal').replace('{a}',answerer);
  rg={answerer, guesser, q, guess:""};
  show(`
    <div class="card">
      <div class="tag">Reveal &amp; Guess</div>
      <h3 class="prompt">${q}</h3>
      <p><b style="color:var(--text)">${answerer}</b>, think of your answer — keep it secret.
      <b style="color:var(--text)">${guesser}</b> will try to guess it.</p>
      <button class="btn" onclick="rgPass()">Pass to ${guesser} to guess</button>
    </div>`);
}
function rgPass(){
  $('veilTitle').textContent=`${rg.guesser}'s eyes only`;
  $('veilText').innerHTML=`${rg.answerer}, look away! Hand the phone to <b>${rg.guesser}</b>.`;
  veil.style.display='flex';
  $('veilBtn').onclick=()=>{ veil.style.display='none'; rgGuessInput(); };
}
function rgGuessInput(){
  show(`
    <div class="card">
      <div class="tag">${rg.guesser} is guessing</div>
      <h3 class="prompt">${rg.q}</h3>
      <p>Type what you think <b style="color:var(--text)">${rg.answerer}</b> will say.
      They won't see it until the reveal.</p>
      <input class="field" id="guessIn" placeholder="Your guess…" autocomplete="off">
      <button class="btn" onclick="rgLock()">Lock in my guess</button>
    </div>`);
  setTimeout(()=>$('guessIn')?.focus(),100);
}
function rgLock(){
  rg.guess=($('guessIn')?.value||"").trim()|| "(no guess)";
  show(`
    <div class="card center">
      <div class="tag">Guess locked</div>
      <h3 class="prompt">Now, ${rg.answerer} — say your real answer out loud.</h3>
      <p>Then reveal ${rg.guesser}'s guess and see how close they were.</p>
      <button class="btn" onclick="rgReveal()">Reveal the guess</button>
    </div>`);
}
function rgReveal(){
  show(`
    <div class="card center">
      <div class="tag">${rg.guesser} guessed</div>
      <h3 class="prompt">“${rg.guess}”</h3>
      <p>How close was it to ${rg.answerer}'s real answer?</p>
      <button class="btn" onclick="rgScore('nailed')">Nailed it ♥</button>
      <button class="btn ghost" onclick="rgScore('close')">Pretty close</button>
      <button class="btn ghost" onclick="rgScore('wayoff')">Way off (lovely surprise!)</button>
    </div>`);
}
function rgScore(result){
  const s=Engine.state, sc=s.pack.scoring.reveal;
  const guesserIdx = s.active===0?1:0, answererIdx=s.active;
  let msg,sub;
  if(result==='nailed'){ Engine.addScore({playerIdx:guesserIdx, sparks:sc.nailed.sp, conn:sc.nailed.conn});
    msg=`${rg.guesser} knows ${rg.answerer}.`; sub=`+${sc.nailed.sp} Sparks · you're in sync`; }
  else if(result==='close'){ Engine.addScore({playerIdx:guesserIdx, sparks:sc.close.sp, conn:sc.close.conn});
    msg='So close!'; sub=`+${sc.close.sp} Sparks`; }
  else { Engine.addScore({playerIdx:answererIdx, sparks:sc.wayoff.answererSp, conn:sc.wayoff.conn});
    msg=`${rg.answerer} surprised you!`; sub=`+${sc.wayoff.answererSp} Sparks to ${rg.answerer} for being unpredictable`; }
  afterResolve(msg,sub,()=>{});
}

/* ---- this-or-that ---- */
function matchCard(){
  const q=Engine.drawFrom('match');
  show(`
    <div class="card center">
      <div class="tag">In sync?</div>
      <h3 class="prompt">${q}</h3>
      <p>Both answer at the same time — on three!</p>
      <button class="btn" onclick="matchScore(true)">We matched!</button>
      <button class="btn ghost" onclick="matchScore(false)">We didn't (still fun)</button>
    </div>`);
}
function matchScore(matched){
  const s=Engine.state, m=s.pack.scoring.match;
  if(matched){ Engine.addScore({playerIdx:0,sparks:m.sp}); Engine.addScore({playerIdx:1,sparks:m.sp,conn:m.conn});
    afterResolve('Two minds, one answer.',`+${m.sp} Sparks each`,()=>{}); }
  else { Engine.addScore({conn:3}); afterResolve('Opposites attract.','+ a little Connection',()=>{}); }
}

/* ---- playful dare ---- */
function playfulCard(){
  const q=Engine.drawFrom('playful').replace('{p}',partnerName());
  show(`
    <div class="card">
      <div class="tag">Playful</div>
      <h3 class="prompt">${activeName()}: ${q}</h3>
      <p>${partnerName()}, judge how it went.</p>
      <button class="btn" onclick="playScore()">Loved it ♥</button>
      <button class="btn ghost" onclick="afterResolve('No pressure.','+ Connection for trying',()=>Engine.addScore({conn:3}))">Skip</button>
    </div>`);
}
function playScore(){ const p=Engine.state.pack.scoring.playful;
  Engine.addScore({playerIdx:Engine.state.active, sparks:p.sp, conn:p.conn});
  afterResolve('A keeper.',`+${p.sp} Sparks`,()=>{}); }

/* ---- reward ---- */
function resolveReward(){ const r=Engine.state.pack.scoring.reward;
  Engine.addScore({playerIdx:Engine.state.active, sparks:r.sp, conn:r.conn});
  afterResolve('A gift from the board.',`+${r.sp} Sparks for ${activeName()}`,()=>{}); }

/* ---- safe / connection (scoreless-ish moment) ---- */
function resolveConnection(){
  const q=Engine.drawFrom('connection');
  show(`
    <div class="card center">
      <div class="tag">A quiet moment</div>
      <h3 class="prompt">${q}</h3>
      <p>No points here. Just the two of you.</p>
      <button class="btn" onclick="afterResolve('That counts for everything.','+ Connection',()=>Engine.addScore({conn:6}))">Done</button>
    </div>`);
}

/* ---- wager (opt-in, both consent; skipping never punishes — GDD §9) ---- */
function resolveWager(){
  const q=Engine.drawFrom('wager');
  show(`
    <div class="card center">
      <div class="tag">Optional wager</div>
      <h3 class="prompt">${q}</h3>
      <p>Only if you both want to. Saying no is always free.</p>
      <button class="btn" onclick="wagerPlay()">We're in</button>
      <button class="btn ghost" onclick="wagerSkip()">Skip (no penalty)</button>
    </div>`);
}
function wagerPlay(){
  const s=Engine.state;
  show(`
    <div class="card center">
      <div class="tag">Who won the wager?</div>
      <h3 class="prompt">Settle it — then tap the winner.</h3>
      <button class="btn" style="background:linear-gradient(180deg,${hex(s.players[0].color)},${hex(s.players[0].color)})"
        onclick="wagerWin(0)">${s.players[0].name}</button>
      <button class="btn" style="background:linear-gradient(180deg,${hex(s.players[1].color)},${hex(s.players[1].color)})"
        onclick="wagerWin(1)">${s.players[1].name}</button>
    </div>`);
}
function wagerWin(i){ const w=Engine.state.pack.scoring.wager_win;
  Engine.addScore({playerIdx:i, sparks:w.sp, conn:w.conn});
  afterResolve(`${Engine.state.players[i].name} takes the stakes!`,`+${w.sp} Sparks`,()=>{}); }
function wagerSkip(){ Engine.addScore({conn:Engine.state.pack.scoring.wager_skip.conn});
  afterResolve('Chose each other over the stakes.','+ Connection',()=>{}); }

/* ---- shared resolution outro + scoring commit + win check + handoff ---- */
function afterResolve(title, sub, sideEffect){
  if(sideEffect) sideEffect();
  refreshHud();
  Engine.state.turn++;
  if(Engine.checkWin()) return setTimeout(screenEnd,500);
  show(`
    <div class="card center">
      <h3 class="prompt" style="font-size:24px">${title}</h3>
      <p>${sub}</p>
      <button class="btn" onclick="handoff()">Pass the phone</button>
    </div>`);
}
function handoff(){
  Engine.endTurn(); const nm=activeName();
  $('veilTitle').textContent=`${nm}, you're up`;
  $('veilText').innerHTML=`Hand the phone to <b>${nm}</b>.`;
  veil.style.display='flex';
  $('veilBtn').textContent="I've got it";
  $('veilBtn').onclick=()=>{ veil.style.display='none'; $('veilBtn').textContent="I have the phone"; turnIntro(); };
}

/* ---- end / recap (no-loser framing — GDD §5.8, FR-20) ---- */
function screenEnd(){
  const s=Engine.state, a=s.players[0], b=s.players[1];
  const deep = s.connection>=MODE_PACK.win.connectionDeep;
  let lead;
  if(a.sparks===b.sparks) lead=`Dead even — ${a.sparks} Sparks each.`;
  else { const w=a.sparks>b.sparks?a:b; lead=`${w.name} edged ahead with ${w.sparks} Sparks.`; }
  show(`
    <div class="card center">
      <div class="eyebrow">Session recap</div>
      <div class="spacer"></div>
      <h2 class="display" style="font-size:32px">${deep?'Deep Connection ♥':'Nicely played'}</h2>
      <p style="margin-top:10px">${lead}<br>
      ${deep ? 'And together you filled the Connection meter — that\'s the real win.'
             : 'You built '+s.connection+'% Connection together. Another round gets you there.'}</p>
      <div style="display:flex; gap:12px; margin-top:8px">
        <div class="score" style="flex:1"><div class="nm"><span class="dot" style="background:${hex(a.color)}"></span>${a.name}</div><div class="sp">${a.sparks}</div></div>
        <div class="score" style="flex:1"><div class="nm"><span class="dot" style="background:${hex(b.color)}"></span>${b.name}</div><div class="sp">${b.sparks}</div></div>
      </div>
      <button class="btn" onclick="playAgain()">Play again</button>
      <button class="btn ghost" onclick="screenStart()">Done for now</button>
    </div>`);
}
function playAgain(){ tokens.forEach(t=>t.userData.to=null);
  Engine.newGame(setup.p1,setup.p2,MODE_PACK); placeTokens(true); refreshHud(); turnIntro(); }

/* ----------------------------- BOOT -------------------------------------- */
window.addEventListener('load', ()=>{ initScene(); screenStart(); });
</script>
</body>
</html>
