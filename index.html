<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Corazones y Apuestas — NOVA FORGE STUDIO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root{
    --night-1:#1a1320; --night-2:#2a1d2e; --surface:#2d2230; --surface-2:#3a2c3e;
    --glow:#f4b860; --glow-soft:#ffd9a0; --rose:#e8717a; --teal:#6db3c9;
    --text:#f5ece4; --muted:#b9a8b0; --line:rgba(244,184,96,.18);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{font-family:"DM Sans",system-ui,-apple-system,Segoe UI,Roboto,sans-serif; color:var(--text);
    background:radial-gradient(120% 120% at 50% 0%, #2a1d2e 0%, #1a1320 55%, #120c16 100%);
    overflow:hidden; position:fixed; inset:0; touch-action:manipulation;}
  #scene{position:fixed; inset:0; z-index:0;}
  #ui{position:fixed; inset:0; z-index:2; display:flex; flex-direction:column; align-items:center;
    justify-content:center; padding:20px; pointer-events:none; overflow-y:auto;}
  .panel{pointer-events:auto; width:100%; max-width:460px; margin:auto;}
  h1,h2,h3{font-family:"Fraunces",Georgia,serif; font-weight:500; margin:0; line-height:1.08;}
  .display{font-size:clamp(32px,8.5vw,50px); letter-spacing:-.01em;}
  .eyebrow{font-size:12px; letter-spacing:.2em; text-transform:uppercase; color:var(--glow); font-weight:700;}
  p{color:var(--muted); line-height:1.5; font-size:15px;}
  .card{background:linear-gradient(180deg,var(--surface) 0%,#271c2b 100%); border:1px solid var(--line);
    border-radius:24px; padding:24px 22px; box-shadow:0 30px 80px -30px rgba(0,0,0,.8), inset 0 1px 0 rgba(255,255,255,.04);
    backdrop-filter:blur(6px); animation:rise .42s cubic-bezier(.2,.8,.2,1) both;}
  @keyframes rise{from{opacity:0; transform:translateY(14px) scale(.98);} to{opacity:1; transform:none;}}
  .btn{pointer-events:auto; display:block; width:100%; border:none; cursor:pointer; font-family:"DM Sans";
    font-weight:700; font-size:16px; padding:15px 18px; border-radius:15px; margin-top:11px; color:#241a14;
    transition:transform .12s, filter .2s; background:linear-gradient(180deg,var(--glow-soft),var(--glow));
    box-shadow:0 10px 24px -8px rgba(244,184,96,.5);}
  .btn:active{transform:translateY(1px) scale(.99);}
  .btn.ghost{background:transparent; color:var(--text); border:1px solid var(--line); box-shadow:none; font-weight:500;}
  .btn.sm{font-size:13px; padding:9px 12px; margin-top:0; width:auto;}
  .field,textarea.field{width:100%; background:#211824; border:1px solid var(--line); color:var(--text);
    border-radius:14px; padding:13px 15px; font-family:"DM Sans"; font-size:16px; margin-top:10px;}
  textarea.field{resize:vertical; min-height:74px; line-height:1.4;}
  select.field{appearance:none;}
  .field:focus{outline:none; border-color:var(--glow);}
  .swatches{display:flex; gap:10px; margin-top:10px; flex-wrap:wrap;}
  .sw{width:34px; height:34px; border-radius:50%; cursor:pointer; border:2px solid transparent;}
  .sw.sel{border-color:var(--text); transform:scale(1.12);}
  .who{font-family:"Fraunces"; font-size:13px;}
  .tag{display:inline-block; font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--glow);
    font-weight:700; margin-bottom:12px;}
  .prompt{font-family:"Fraunces"; font-size:clamp(21px,5.6vw,27px); line-height:1.22; margin:4px 0;}
  .center{text-align:center;} .spacer{height:10px;} .mini{font-size:13px; color:var(--muted); margin-top:14px;}
  /* HUD */
  #hud{position:fixed; top:0; left:0; right:0; z-index:3; padding:12px 14px; display:none; gap:10px; pointer-events:none;}
  .score{flex:1; background:rgba(20,14,22,.55); border:1px solid var(--line); border-radius:14px; padding:7px 11px; backdrop-filter:blur(8px);}
  .score .nm{font-size:12px; color:var(--muted); display:flex; align-items:center; gap:6px;}
  .dot{width:9px; height:9px; border-radius:50%;}
  .score .sp{font-family:"Fraunces"; font-size:20px;} .score .spl{font-size:10px; color:var(--muted);}
  #conn{position:fixed; bottom:0; left:0; right:0; z-index:3; padding:10px 14px 16px; display:none; pointer-events:none;}
  .connbar{height:12px; border-radius:8px; background:rgba(20,14,22,.6); border:1px solid var(--line); overflow:hidden;}
  .connfill{height:100%; width:0%; border-radius:8px; background:linear-gradient(90deg,var(--rose),var(--glow)); transition:width .6s cubic-bezier(.2,.8,.2,1);}
  .connlbl{font-size:11px; letter-spacing:.13em; text-transform:uppercase; color:var(--muted); text-align:center; margin-bottom:6px;}
  /* Veil */
  #veil{position:fixed; inset:0; z-index:5; display:none; flex-direction:column; align-items:center; justify-content:center;
    padding:28px; text-align:center; background:radial-gradient(80% 60% at 50% 45%, #2a1d2e, #120c16);}
  .seal{width:104px; height:104px; border-radius:50%; margin-bottom:20px;
    background:radial-gradient(circle at 35% 30%, var(--glow-soft), var(--glow) 60%, #c98a2e);
    box-shadow:0 16px 50px -10px rgba(244,184,96,.5); display:flex; align-items:center; justify-content:center;
    font-size:44px; animation:pulse 2.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
  /* Editor rows */
  .ed-scroll{max-height:58vh; overflow-y:auto; margin:6px -4px 0; padding:0 4px;}
  .ed-cat{font-family:"Fraunces"; font-size:18px; margin:16px 0 4px;}
  .ed-cat .h{font-size:12px; color:var(--muted); font-family:"DM Sans"; font-weight:400;}
  .ed-row{display:flex; align-items:center; gap:8px; padding:9px 0; border-bottom:1px solid rgba(244,184,96,.08);}
  .ed-row .tx{flex:1; font-size:14px; line-height:1.35;}
  .ed-row.off .tx{opacity:.4;}
  .chk{width:26px; height:26px; border-radius:8px; border:1px solid var(--line); background:#211824; color:var(--glow);
    font-size:15px; cursor:pointer; flex:none; display:flex; align-items:center; justify-content:center;}
  .chk.on{background:linear-gradient(180deg,var(--glow-soft),var(--glow)); color:#241a14; border-color:transparent;}
  .ico{background:none; border:none; color:var(--muted); font-size:16px; cursor:pointer; padding:4px;}
  .toprow{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .foottag{position:fixed; bottom:5px; left:0; right:0; text-align:center; z-index:1; font-size:10px;
    letter-spacing:.16em; text-transform:uppercase; color:rgba(185,168,176,.4);}
  @media (prefers-reduced-motion: reduce){*{animation:none !important; transition:none !important;}}
</style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div id="hud">
    <div class="score"><div class="nm"><span class="dot" id="d1"></span><span id="n1">Jugador 1</span></div><div class="sp" id="sp1">0</div><div class="spl">Chispas</div></div>
    <div class="score"><div class="nm"><span class="dot" id="d2"></span><span id="n2">Jugador 2</span></div><div class="sp" id="sp2">0</div><div class="spl">Chispas</div></div>
  </div>
  <div id="conn"><div class="connlbl" id="connlbl">Conexión</div><div class="connbar"><div class="connfill" id="connfill"></div></div></div>
  <div id="ui"><div class="panel" id="panel"></div></div>
  <div id="veil">
    <div class="seal">🤫</div>
    <h2 class="display" id="veilTitle">En secreto</h2>
    <p id="veilText" style="max-width:320px;"></p>
    <button class="btn" id="veilBtn" style="max-width:320px;">Ya tengo el teléfono</button>
    <div class="mini">Pasá el teléfono antes de tocar.</div>
  </div>
  <div class="foottag">NOVA FORGE STUDIO · prototipo</div>

<script>
/* ===========================================================================
   CORAZONES Y APUESTAS — prototipo (en español)
   NOVA FORGE STUDIO · juego de mesa para parejas
   Refleja la separación motor/contenido del GDD §4:
   - MODE_PACK / Content = contenido editable (preguntas, retos, mazos)
   - Engine = runtime que no sabe nada del tema
   - 3D / UI = presentación
   Novedades de esta versión: todo en español + editor de preguntas
   (elegir cuáles entran, crear/editar/borrar, guardado en el dispositivo).
   =========================================================================== */

/* ----------------------- CONTENIDO POR DEFECTO --------------------------- */
const CAT_LABEL = { reveal:'Revelar y adivinar', match:'¿En sintonía?', playful:'Juego / Reto',
                    connection:'Momento', wager:'Apuesta' };
const CAT_HELP = {
  reveal:'Una pregunta sobre quien responde. Escribí {a} donde quieras que aparezca su nombre.',
  match:'Una opción A o B para responder al mismo tiempo.',
  playful:'Un reto para hacer. Escribí {p} para el nombre de la pareja.',
  connection:'Un momento lindo, sin puntos.',
  wager:'Una apuesta opcional con un premio jugado.' };

const DEFAULT_CONTENT = {
  reveal:[
    "{a}, ¿cuál sería tu domingo perfecto sin hacer nada?",
    "{a}, si pudiéramos teletransportarnos ahora mismo, ¿a dónde irías?",
    "{a}, ¿qué cosa chiquita siempre te alegra el día?",
    "{a}, ¿cuál es tu canción de consuelo secreta?",
    "{a}, ¿qué pedís siempre en el café?",
    "{a}, ¿en qué mundo de ficción te gustaría vivir?",
    "{a}, ¿qué es lo primero que comprarías si la plata no importara?",
    "{a}, ¿qué comida podrías comer feliz todos los días?",
    "{a}, ¿cuál es tu idea de una cita perfecta?",
    "{a}, ¿en qué sos raramente bueno/a?",
    "{a}, ¿cuál es el emoji que más usás?",
    "{a}, ¿de qué cosa chiquita estás orgulloso/a esta semana?"
  ],
  match:[
    "¿Montaña o playa?","¿Madrugador/a o nocturno/a?","¿Dulce o salado?",
    "¿Planear todo o fluir?","¿Fiesta grande o noche tranquila en casa?",
    "¿Mensajes o llamadas?","¿Amanecer o atardecer?","¿Cocinar en casa o salir a comer?"
  ],
  playful:[
    "Dale a {p} un discurso motivador de 10 segundos.",
    "Hacé tu mejor imitación de {p} pidiendo un café.",
    "Describí a {p} usando solo títulos de películas.",
    "Decile a {p} un cumplido que nunca le hayas dicho.",
    "Recreá la cara que pusiste en su primera cita."
  ],
  connection:[
    "Díganse una cosa por la que están agradecidos hoy.",
    "Compartan un recuerdo de ustedes dos que siempre los haga sonreír.",
    "Nombren algo que tengan ganas de hacer juntos.",
    "Levantá la vista del teléfono y decí algo lindo, en voz alta."
  ],
  wager:[
    "Concurso de miradas de 10 segundos. El que pierde prepara el próximo snack.",
    "El primero que se ría hace el baile ridículo que elija el otro.",
    "Piedra, papel o tijera: el ganador elige la próxima canción."
  ]
};

/* ----------------------- ALMACÉN (persistencia) -------------------------- */
const LS_CONTENT='cya_content_v1', LS_PROFILE='cya_profile_v1';
let storageOK=true;
function lsGet(k){ try{ return localStorage.getItem(k);}catch(e){ storageOK=false; return null; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); return true;}catch(e){ storageOK=false; return false; } }

const Content = {
  items:[], _seq:0,
  newId(){ return 'p'+(Date.now().toString(36))+(this._seq++); },
  build(){
    this.items=[];
    Object.keys(DEFAULT_CONTENT).forEach(cat=>{
      DEFAULT_CONTENT[cat].forEach(text=> this.items.push({id:this.newId(),cat,text,enabled:true,custom:false}) );
    });
  },
  load(){
    const raw=lsGet(LS_CONTENT);
    if(raw){ try{ const o=JSON.parse(raw); if(o&&Array.isArray(o.items)&&o.items.length){ this.items=o.items; return; } }catch(e){} }
    this.build(); this.save();
  },
  save(){ lsSet(LS_CONTENT, JSON.stringify({items:this.items})); },
  byCat(cat){ return this.items.filter(i=>i.cat===cat); },
  enabled(cat){ return this.items.filter(i=>i.cat===cat && i.enabled); },
  has(cat){ return this.enabled(cat).length>0; },
  toggle(id){ const it=this.items.find(i=>i.id===id); if(it){ it.enabled=!it.enabled; this.save(); } },
  add(cat,text){ this.items.push({id:this.newId(),cat,text:text.trim(),enabled:true,custom:true}); this.save(); },
  edit(id,text){ const it=this.items.find(i=>i.id===id); if(it){ it.text=text.trim(); this.save(); } },
  remove(id){ this.items=this.items.filter(i=>i.id!==id); this.save(); },
  reset(){ this.build(); this.save(); }
};

const Profile = {
  data:{p1:{name:"",color:0xe8717a}, p2:{name:"",color:0x6db3c9}},
  load(){ const raw=lsGet(LS_PROFILE); if(raw){ try{ const o=JSON.parse(raw); if(o&&o.p1&&o.p2) this.data=o; }catch(e){} } },
  save(){ lsSet(LS_PROFILE, JSON.stringify(this.data)); }
};

/* ----------------------------- MODE PACK --------------------------------- */
const MODE_PACK = {
  scoring:{ reveal:{nailed:{sp:3,conn:14}, close:{sp:2,conn:9}, wayoff:{answererSp:3,conn:5}},
            match:{sp:1,conn:8}, playful:{sp:2,conn:7}, reward:{sp:2,conn:4},
            wager_win:{sp:3,conn:6}, wager_skip:{conn:3} },
  win:{ lapsToGoal:1, connectionDeep:60, turnCap:18 },
  boardTypes:["start","prompt","prompt","reward","prompt","safe","prompt","wager",
              "prompt","prompt","reward","prompt","safe","prompt","wager","prompt"]
};

/* ----------------------------- MOTOR (reutilizable) ---------------------- */
let lastDraw={};
const Engine = {
  state:null,
  newGame(p1,p2){
    this.state={ pack:MODE_PACK,
      players:[ {name:p1.name||"Jugador 1",color:p1.color,sparks:0,pos:0,laps:0},
                {name:p2.name||"Jugador 2",color:p2.color,sparks:0,pos:0,laps:0} ],
      connection:0, active:0, turn:0 };
    lastDraw={}; return this.state;
  },
  roll(){ return 1+Math.floor(Math.random()*3); },
  drawByCat(cat){
    let pool=Content.enabled(cat); if(!pool.length) return null;
    if(pool.length>1) pool=pool.filter(i=>i.id!==lastDraw[cat]);
    const pick=pool[Math.floor(Math.random()*pool.length)]; lastDraw[cat]=pick.id; return pick.text;
  },
  tileType(pos){ return MODE_PACK.boardTypes[pos % MODE_PACK.boardTypes.length]; },
  advance(steps){ const s=this.state,p=s.players[s.active],n=MODE_PACK.boardTypes.length;
    for(let i=0;i<steps;i++){ p.pos=(p.pos+1)%n; if(p.pos===0) p.laps++; } return p.pos; },
  addScore({playerIdx=null,sparks=0,conn=0}={}){ const s=this.state;
    if(playerIdx!==null) s.players[playerIdx].sparks+=sparks; s.connection=Math.min(100,s.connection+conn); },
  checkWin(){ const s=this.state,w=MODE_PACK.win;
    return s.players.some(p=>p.laps>=w.lapsToGoal) || s.turn>=w.turnCap; },
  endTurn(){ const s=this.state; s.active=s.active===0?1:0; s.turn++; }
};

/* ----------------------------- TABLERO 3D -------------------------------- */
let renderer,scene,camera,tiles=[],tokens=[],die,dieSpin=0,raf,scene3DReady=false;
const TYPE_COLOR={start:0xf4b860,prompt:0xf4b860,reward:0x8fd6a0,safe:0x8fb8e0,wager:0xe8717a,goal:0xffe2a8};
function ringPositions(){
  const N=5,gap=1.32,off=(N-1)/2,ring=[],pts=[];
  for(let c=0;c<N;c++) ring.push([0,c]);
  for(let r=1;r<N;r++) ring.push([r,N-1]);
  for(let c=N-2;c>=0;c--) ring.push([N-1,c]);
  for(let r=N-2;r>=1;r--) ring.push([r,0]);
  ring.forEach(([r,c])=>pts.push([(c-off)*gap,0,(r-off)*gap])); return pts;
}
function initScene(){
  if(typeof THREE==='undefined'){ console.warn('Sin librería 3D — el juego corre igual.'); return; }
  const cv=document.getElementById('scene');
  renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2)); resize();
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,100);
  camera.position.set(0,7.4,6.2); camera.lookAt(0,0,0.2);
  scene.add(new THREE.AmbientLight(0xffe7c4,.55));
  const key=new THREE.PointLight(0xffd9a0,1.5,40); key.position.set(0,7,2.5); scene.add(key);
  const rim=new THREE.DirectionalLight(0x6db3c9,.5); rim.position.set(-4,3,-5); scene.add(rim);
  const base=new THREE.Mesh(new THREE.BoxGeometry(8.4,0.5,8.4),new THREE.MeshStandardMaterial({color:0x241826,roughness:.85,metalness:.1}));
  base.position.y=-0.45; scene.add(base);
  const inlay=new THREE.Mesh(new THREE.BoxGeometry(7.4,0.06,7.4),new THREE.MeshStandardMaterial({color:0x33223a,roughness:.6,emissive:0x1a0f1f}));
  inlay.position.y=-0.16; scene.add(inlay);
  const pts=ringPositions();
  pts.forEach((p,i)=>{ const type=MODE_PACK.boardTypes[i];
    const m=new THREE.Mesh(new THREE.BoxGeometry(.92,.18,.92),new THREE.MeshStandardMaterial({color:TYPE_COLOR[type]||0xf4b860,roughness:.4,metalness:.2}));
    m.position.set(p[0],0,p[2]); scene.add(m); tiles.push(m); });
  [0,1].forEach(i=>{ const g=new THREE.Group(); const col=i===0?0xe8717a:0x6db3c9;
    const stem=new THREE.Mesh(new THREE.CylinderGeometry(.16,.22,.34,20),new THREE.MeshStandardMaterial({color:col,roughness:.3,metalness:.3}));
    const head=new THREE.Mesh(new THREE.SphereGeometry(.2,24,18),new THREE.MeshStandardMaterial({color:col,roughness:.25,metalness:.35,emissive:col,emissiveIntensity:.15}));
    head.position.y=.32; g.add(stem); g.add(head); g.position.y=.22; scene.add(g); tokens.push(g); });
  die=new THREE.Mesh(new THREE.BoxGeometry(.7,.7,.7),new THREE.MeshStandardMaterial({color:0xfff2dc,roughness:.35,metalness:.1}));
  die.position.set(0,.7,0.1); scene.add(die);
  placeTokens(true); scene3DReady=true; animate(); addEventListener('resize',resize);
}
function resize(){ if(!renderer) return; renderer.setSize(innerWidth,innerHeight);
  if(camera){camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();} }
function tokenTarget(idx){ const pts=ringPositions(),p=pts[Engine.state.players[idx].pos],o=idx===0?-0.16:0.16;
  return new THREE.Vector3(p[0]+o,.22,p[2]+o); }
function placeTokens(instant){ if(!scene3DReady) return;
  tokens.forEach((t,i)=>{ const tg=tokenTarget(i); if(instant){t.position.copy(tg);} else {t.userData.to=tg; t.userData.t=0;} }); }
function animate(){ raf=requestAnimationFrame(animate);
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  tokens.forEach(t=>{ if(t.userData.to){ t.userData.t=Math.min(1,(t.userData.t||0)+(reduce?1:.08));
    t.position.lerp(t.userData.to,reduce?1:.18); t.position.y=.22+(reduce?0:Math.sin(t.userData.t*Math.PI)*.35);
    if(t.userData.t>=1){t.position.copy(t.userData.to); t.userData.to=null;} } });
  if(dieSpin>0&&!reduce){ die.rotation.x+=.34; die.rotation.y+=.27; dieSpin--; if(dieSpin===0) die.rotation.set(0,0,0); }
  renderer.render(scene,camera);
}
function pulseTile(pos){ if(!scene3DReady) return; const m=tiles[pos]; if(!m) return;
  m.material.emissive.setHex(0x5a3a12); setTimeout(()=>m.material.emissive.setHex(0x000000),900); }

/* ----------------------------- UI / FLUJO -------------------------------- */
const panel=document.getElementById('panel'), veil=document.getElementById('veil');
const COLORS=[0xe8717a,0xf4b860,0x8fd6a0,0x6db3c9,0xb89cd9,0xef9bc0];
function hex(n){return '#'+n.toString(16).padStart(6,'0');}
function show(html){ panel.innerHTML=html; document.getElementById('ui').scrollTop=0; }
function $(id){return document.getElementById(id);}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function hideHud(){ $('hud').style.display='none'; $('conn').style.display='none'; }

function screenStart(){
  hideHud();
  show(`<div class="card center">
    <div class="eyebrow">Un juego de NOVA FORGE STUDIO</div><div class="spacer"></div>
    <h1 class="display">Corazones<br>y Apuestas</h1>
    <p style="margin-top:14px">Un juego de mesa para dos, en un solo teléfono.
    Avancen, revelen, adivinen — y descubran cuánto se conocen.</p>
    <button class="btn" onclick="screenSetup()">Empezar</button>
    <button class="btn ghost" onclick="screenEditor()">Personalizar preguntas</button>
    <div class="mini">Pasen el teléfono cuando el juego lo pida. El que pierde igual gana un abrazo.</div>
  </div>`);
}

function screenSetup(){
  const d=Profile.data;
  const sw=(who,sel)=>COLORS.map(c=>`<div class="sw ${c===sel?'sel':''}" style="background:${hex(c)}" onclick="pickColor('${who}',${c})"></div>`).join('');
  show(`<div class="card">
    <div class="eyebrow">Quiénes juegan</div><div class="spacer"></div>
    <h2 class="display" style="font-size:30px">Solo ustedes dos</h2>
    <input class="field" id="in1" placeholder="Nombre del primer jugador" value="${esc(d.p1.name)}">
    <div class="swatches">${sw('p1',d.p1.color)}</div>
    <div style="height:12px"></div>
    <input class="field" id="in2" placeholder="Nombre del segundo jugador" value="${esc(d.p2.name)}">
    <div class="swatches">${sw('p2',d.p2.color)}</div>
    <button class="btn" onclick="startGame()">Armar el tablero</button>
    <button class="btn ghost" onclick="quickStart()">Inicio rápido (sin nombres)</button>
    <button class="btn ghost" onclick="screenEditor()">Personalizar preguntas</button>
  </div>`);
}
function pickColor(who,c){ Profile.data[who].color=c;
  Profile.data.p1.name=$('in1')?.value||Profile.data.p1.name; Profile.data.p2.name=$('in2')?.value||Profile.data.p2.name; screenSetup(); }
function quickStart(){ Profile.data.p1.name=Profile.data.p1.name||"Jugador 1"; Profile.data.p2.name=Profile.data.p2.name||"Jugador 2"; startGame(); }
function startGame(){
  Profile.data.p1.name=($('in1')?.value||Profile.data.p1.name).trim()||"Jugador 1";
  Profile.data.p2.name=($('in2')?.value||Profile.data.p2.name).trim()||"Jugador 2";
  Profile.save();
  Engine.newGame(Profile.data.p1,Profile.data.p2);
  if(scene3DReady){ tokens[0].children.forEach(m=>m.material.color.setHex(Profile.data.p1.color));
    tokens[1].children.forEach(m=>m.material.color.setHex(Profile.data.p2.color)); placeTokens(true); }
  $('d1').style.background=hex(Profile.data.p1.color); $('d2').style.background=hex(Profile.data.p2.color);
  $('n1').textContent=Profile.data.p1.name; $('n2').textContent=Profile.data.p2.name;
  $('hud').style.display='flex'; $('conn').style.display='block'; refreshHud(); turnIntro();
}
function refreshHud(){ const s=Engine.state;
  $('sp1').textContent=s.players[0].sparks; $('sp2').textContent=s.players[1].sparks;
  $('connfill').style.width=s.connection+'%';
  $('connlbl').textContent=s.connection>=MODE_PACK.win.connectionDeep?'Conexión profunda ♥':'Conexión'; }
function activeName(){return Engine.state.players[Engine.state.active].name;}
function partnerName(){return Engine.state.players[Engine.state.active===0?1:0].name;}

/* ----------------------------- EDITOR ------------------------------------ */
let ed={form:false, cat:'reveal', editId:null, fromGame:false};
function screenEditor(){
  hideHud();
  const cats=Object.keys(CAT_LABEL);
  let rows='';
  cats.forEach(cat=>{
    const items=Content.byCat(cat);
    rows+=`<div class="ed-cat">${CAT_LABEL[cat]} <span class="h">· ${Content.enabled(cat).length}/${items.length} activas</span></div>`;
    if(!items.length){ rows+=`<p style="margin:4px 0">Sin preguntas. Agregá una abajo.</p>`; }
    items.forEach(it=>{
      rows+=`<div class="ed-row ${it.enabled?'':'off'}">
        <button class="chk ${it.enabled?'on':''}" onclick="edToggle('${it.id}')" title="Incluir">${it.enabled?'✓':''}</button>
        <div class="tx">${esc(it.text)}</div>
        <button class="ico" onclick="edEdit('${it.id}')" title="Editar">✎</button>
        <button class="ico" onclick="edDelete('${it.id}')" title="Borrar">🗑</button>
      </div>`;
    });
  });
  show(`<div class="card">
    <div class="toprow"><div class="eyebrow">Personalizar preguntas</div>
      <button class="btn ghost sm" onclick="${ed.fromGame?'backToGameFromEditor()':'screenStart()'}">${ed.fromGame?'Volver':'Listo'}</button></div>
    <p style="margin-top:8px">Tocá ✓ para elegir cuáles entran en la partida. Editá ✎, borrá 🗑, o agregá las tuyas. Se guardan en este teléfono.</p>
    ${ed.form?editorForm():`<button class="btn" onclick="edOpenForm()">+ Agregar pregunta</button>`}
    <div class="ed-scroll">${rows}</div>
    <button class="btn ghost" style="margin-top:14px" onclick="screenExport()">Respaldar / Importar</button>
    <button class="btn ghost" onclick="edReset()">Restaurar preguntas originales</button>
    ${storageOK?'':'<div class="mini" style="color:var(--rose)">Atención: este navegador no permite guardar. Tus cambios durarán solo esta sesión.</div>'}
  </div>`);
}
function editorForm(){
  const opts=Object.keys(CAT_LABEL).map(c=>`<option value="${c}" ${c===ed.cat?'selected':''}>${CAT_LABEL[c]}</option>`).join('');
  const cur=ed.editId?Content.items.find(i=>i.id===ed.editId):null;
  return `<div style="border:1px solid var(--line); border-radius:16px; padding:14px; margin-top:6px">
    <div class="eyebrow">${ed.editId?'Editar pregunta':'Nueva pregunta'}</div>
    <select class="field" id="edCat" onchange="ed.cat=this.value; edHelp()" ${ed.editId?'disabled':''}>${opts}</select>
    <div class="mini" id="edHelp" style="margin-top:6px">${CAT_HELP[cur?cur.cat:ed.cat]}</div>
    <textarea class="field" id="edText" placeholder="Escribí la pregunta o el reto…">${cur?esc(cur.text):''}</textarea>
    <div class="row" style="display:flex; gap:10px">
      <button class="btn" onclick="edSave()">Guardar</button>
      <button class="btn ghost" onclick="edCancel()">Cancelar</button>
    </div>
  </div>`;
}
function edHelp(){ const h=$('edHelp'); if(h) h.textContent=CAT_HELP[$('edCat').value]; }
function edOpenForm(){ ed.form=true; ed.editId=null; ed.cat='reveal'; screenEditor(); }
function edEdit(id){ const it=Content.items.find(i=>i.id===id); if(!it) return; ed.form=true; ed.editId=id; ed.cat=it.cat; screenEditor(); }
function edSave(){ const text=($('edText')?.value||'').trim(); if(!text){ $('edText').focus(); return; }
  if(ed.editId){ Content.edit(ed.editId,text); } else { Content.add($('edCat').value,text); }
  ed.form=false; ed.editId=null; screenEditor(); }
function edCancel(){ ed.form=false; ed.editId=null; screenEditor(); }
function edToggle(id){ Content.toggle(id); screenEditor(); }
function edDelete(id){ Content.remove(id); if(ed.editId===id){ed.form=false; ed.editId=null;} screenEditor(); }
function edReset(){ if(confirm('¿Restaurar todas las preguntas originales? Se quitan las que agregaste.')){ Content.reset(); ed.form=false; screenEditor(); } }
function backToGameFromEditor(){ ed.fromGame=false; turnIntro(); $('hud').style.display='flex'; $('conn').style.display='block'; }

/* Respaldo / importación */
function screenExport(){
  const json=JSON.stringify({items:Content.items});
  show(`<div class="card">
    <div class="toprow"><div class="eyebrow">Respaldar / Importar</div>
      <button class="btn ghost sm" onclick="screenEditor()">Volver</button></div>
    <p style="margin-top:8px">Copiá este texto para guardar tus preguntas, o pegá uno para importarlas en otro teléfono.</p>
    <textarea class="field" id="expText" style="min-height:120px; font-size:13px">${esc(json)}</textarea>
    <button class="btn" onclick="copyExport()">Copiar</button>
    <button class="btn ghost" onclick="importContent()">Importar desde el texto de arriba</button>
  </div>`);
}
function copyExport(){ const t=$('expText'); t.select();
  try{ navigator.clipboard.writeText(t.value); alert('Copiado ✓'); }catch(e){ try{ document.execCommand('copy'); alert('Copiado ✓'); }catch(_){ alert('Seleccioná el texto y copialo a mano.'); } } }
function importContent(){ try{ const o=JSON.parse($('expText').value);
    if(o&&Array.isArray(o.items)&&o.items.length){ Content.items=o.items.map(i=>({enabled:true,custom:true,...i})); Content.save(); alert('Importado ✓'); screenEditor(); }
    else alert('El texto no tiene preguntas válidas.'); }catch(e){ alert('No pude leer ese texto. Revisá que esté completo.'); } }

/* ----------------------------- PARTIDA ----------------------------------- */
function turnIntro(){ const s=Engine.state,p=s.players[s.active];
  show(`<div class="card center">
    <div class="who" style="color:${hex(p.color)}">Turno de ${esc(p.name)}</div>
    <h2 class="display" style="font-size:30px; margin-top:6px">Tu tirada</h2>
    <p>Tocá para mandar tu ficha a recorrer el tablero.</p>
    <button class="btn" onclick="doRoll()">Tirar el dado</button>
    <button class="btn ghost" onclick="ed.fromGame=true; hideHud(); screenEditor()">Editar preguntas</button>
  </div>`); }
function doRoll(){ const steps=Engine.roll(); dieSpin=22;
  show(`<div class="card center"><div class="eyebrow">Tirando…</div><h2 class="display" style="font-size:64px; margin-top:8px">${steps}</h2></div>`);
  setTimeout(()=>{ Engine.advance(steps); placeTokens(false); setTimeout(resolveTile,700); },650); }
function resolveTile(){ const s=Engine.state,p=s.players[s.active]; pulseTile(p.pos);
  const type=p.pos===0?'goal':Engine.tileType(p.pos);
  if(type==='goal'){ s.turn++; if(Engine.checkWin()) return screenEnd(); return afterResolve('¡Diste la vuelta al tablero!','+ impulso',()=>{}); }
  if(type==='reward') return resolveReward();
  if(type==='safe') return resolveConnection();
  if(type==='wager') return resolveWager();
  return resolvePrompt(); }

function resolvePrompt(){
  const kinds=['reveal','reveal','match','playful'].filter(k=>Content.has(k));
  if(!kinds.length) return resolveReward();
  const k=kinds[Math.floor(Math.random()*kinds.length)];
  if(k==='reveal') return revealIntro();
  if(k==='match') return matchCard();
  return playfulCard();
}

/* Revelar y adivinar (con pase a ciegas) */
let rg={};
function revealIntro(){ const a=activeName(),g=partnerName(),q=(Engine.drawByCat('reveal')||'').replace('{a}',a);
  rg={a,g,q,guess:""};
  show(`<div class="card">
    <div class="tag">Revelar y adivinar</div>
    <h3 class="prompt">${esc(q)}</h3>
    <p><b style="color:var(--text)">${esc(a)}</b>, pensá tu respuesta y mantenela en secreto.
    <b style="color:var(--text)">${esc(g)}</b> va a tratar de adivinarla.</p>
    <button class="btn" onclick="rgPass()">Pasale el teléfono a ${esc(g)} para adivinar</button>
  </div>`); }
function rgPass(){ $('veilTitle').textContent=`Solo para ${rg.g}`;
  $('veilText').innerHTML=`${esc(rg.a)}, mirá para otro lado. Pasale el teléfono a <b>${esc(rg.g)}</b>.`;
  veil.style.display='flex'; $('veilBtn').textContent='Ya tengo el teléfono'; $('veilBtn').onclick=()=>{ veil.style.display='none'; rgGuessInput(); }; }
function rgGuessInput(){ show(`<div class="card">
    <div class="tag">${esc(rg.g)} está adivinando</div>
    <h3 class="prompt">${esc(rg.q)}</h3>
    <p>Escribí lo que crees que va a responder <b style="color:var(--text)">${esc(rg.a)}</b>. No lo va a ver hasta el final.</p>
    <input class="field" id="guessIn" placeholder="Tu respuesta…" autocomplete="off">
    <button class="btn" onclick="rgLock()">Confirmar mi respuesta</button>
  </div>`); setTimeout(()=>$('guessIn')?.focus(),100); }
function rgLock(){ rg.guess=($('guessIn')?.value||'').trim()||'(sin respuesta)';
  show(`<div class="card center">
    <div class="tag">Respuesta confirmada</div>
    <h3 class="prompt">Ahora ${esc(rg.a)}, decí tu respuesta en voz alta.</h3>
    <p>Después revelá lo que puso ${esc(rg.g)} y vean qué tan cerca estuvo.</p>
    <button class="btn" onclick="rgReveal()">Revelar la respuesta</button>
  </div>`); }
function rgReveal(){ show(`<div class="card center">
    <div class="tag">${esc(rg.g)} respondió</div>
    <h3 class="prompt">“${esc(rg.guess)}”</h3>
    <p>¿Qué tan cerca estuvo de la respuesta real de ${esc(rg.a)}?</p>
    <button class="btn" onclick="rgScore('nailed')">¡Le pegó! ♥</button>
    <button class="btn ghost" onclick="rgScore('close')">Bastante cerca</button>
    <button class="btn ghost" onclick="rgScore('wayoff')">Muy lejos (¡linda sorpresa!)</button>
  </div>`); }
function rgScore(r){ const sc=MODE_PACK.scoring.reveal, gi=Engine.state.active===0?1:0, ai=Engine.state.active; let msg,sub;
  if(r==='nailed'){ Engine.addScore({playerIdx:gi,sparks:sc.nailed.sp,conn:sc.nailed.conn}); msg=`${rg.g} conoce a ${rg.a}.`; sub=`+${sc.nailed.sp} Chispas · están en sintonía`; }
  else if(r==='close'){ Engine.addScore({playerIdx:gi,sparks:sc.close.sp,conn:sc.close.conn}); msg='¡Por poco!'; sub=`+${sc.close.sp} Chispas`; }
  else { Engine.addScore({playerIdx:ai,sparks:sc.wayoff.answererSp,conn:sc.wayoff.conn}); msg=`¡${rg.a} te sorprendió!`; sub=`+${sc.wayoff.answererSp} Chispas para ${rg.a} por imprevisible`; }
  afterResolve(msg,sub,()=>{}); }

/* ¿En sintonía? */
function matchCard(){ const q=Engine.drawByCat('match')||'';
  show(`<div class="card center">
    <div class="tag">¿En sintonía?</div>
    <h3 class="prompt">${esc(q)}</h3>
    <p>Respondan al mismo tiempo — ¡a la cuenta de tres!</p>
    <button class="btn" onclick="matchScore(true)">¡Coincidimos!</button>
    <button class="btn ghost" onclick="matchScore(false)">No coincidimos (igual divertido)</button>
  </div>`); }
function matchScore(m){ const sc=MODE_PACK.scoring.match;
  if(m){ Engine.addScore({playerIdx:0,sparks:sc.sp}); Engine.addScore({playerIdx:1,sparks:sc.sp,conn:sc.conn}); afterResolve('Dos mentes, una respuesta.',`+${sc.sp} Chispas para cada uno`,()=>{}); }
  else { Engine.addScore({conn:3}); afterResolve('Los opuestos se atraen.','+ un poco de Conexión',()=>{}); } }

/* Juego / reto */
function playfulCard(){ const q=(Engine.drawByCat('playful')||'').replace('{p}',partnerName());
  show(`<div class="card">
    <div class="tag">Juego</div>
    <h3 class="prompt">${esc(activeName())}: ${esc(q)}</h3>
    <p>${esc(partnerName())}, juzgá cómo salió.</p>
    <button class="btn" onclick="playScore()">¡Me encantó! ♥</button>
    <button class="btn ghost" onclick="afterResolve('Sin presión.','+ Conexión por intentarlo',()=>Engine.addScore({conn:3}))">Saltar</button>
  </div>`); }
function playScore(){ const sc=MODE_PACK.scoring.playful; Engine.addScore({playerIdx:Engine.state.active,sparks:sc.sp,conn:sc.conn}); afterResolve('De los que se guardan.',`+${sc.sp} Chispas`,()=>{}); }

/* Recompensa */
function resolveReward(){ const sc=MODE_PACK.scoring.reward; Engine.addScore({playerIdx:Engine.state.active,sparks:sc.sp,conn:sc.conn}); afterResolve('Un regalo del tablero.',`+${sc.sp} Chispas para ${activeName()}`,()=>{}); }

/* Momento (sin puntos) */
function resolveConnection(){ const q=Engine.drawByCat('connection')||'Mírense y díganse algo lindo.';
  show(`<div class="card center">
    <div class="tag">Un momento tranquilo</div>
    <h3 class="prompt">${esc(q)}</h3>
    <p>Acá no hay puntos. Solo ustedes dos.</p>
    <button class="btn" onclick="afterResolve('Eso vale todo.','+ Conexión',()=>Engine.addScore({conn:6}))">Listo</button>
  </div>`); }

/* Apuesta (opcional, saltar nunca penaliza) */
function resolveWager(){ if(!Content.has('wager')) return resolveReward();
  const q=Engine.drawByCat('wager')||'';
  show(`<div class="card center">
    <div class="tag">Apuesta opcional</div>
    <h3 class="prompt">${esc(q)}</h3>
    <p>Solo si los dos quieren. Decir que no siempre es gratis.</p>
    <button class="btn" onclick="wagerPlay()">Le entramos</button>
    <button class="btn ghost" onclick="wagerSkip()">Saltar (sin penalización)</button>
  </div>`); }
function wagerPlay(){ const s=Engine.state;
  show(`<div class="card center"><div class="tag">¿Quién ganó la apuesta?</div>
    <h3 class="prompt">Defínanlo y toquen al ganador.</h3>
    <button class="btn" style="background:linear-gradient(180deg,${hex(s.players[0].color)},${hex(s.players[0].color)})" onclick="wagerWin(0)">${esc(s.players[0].name)}</button>
    <button class="btn" style="background:linear-gradient(180deg,${hex(s.players[1].color)},${hex(s.players[1].color)})" onclick="wagerWin(1)">${esc(s.players[1].name)}</button>
  </div>`); }
function wagerWin(i){ const sc=MODE_PACK.scoring.wager_win; Engine.addScore({playerIdx:i,sparks:sc.sp,conn:sc.conn}); afterResolve(`¡${Engine.state.players[i].name} se lleva la apuesta!`,`+${sc.sp} Chispas`,()=>{}); }
function wagerSkip(){ Engine.addScore({conn:MODE_PACK.scoring.wager_skip.conn}); afterResolve('Se eligieron a ustedes antes que a la apuesta.','+ Conexión',()=>{}); }

/* Cierre de jugada + chequeo + pase */
function afterResolve(title,sub,side){ if(side) side(); refreshHud(); Engine.state.turn++;
  if(Engine.checkWin()) return setTimeout(screenEnd,500);
  show(`<div class="card center"><h3 class="prompt" style="font-size:24px">${esc(title)}</h3><p>${esc(sub)}</p>
    <button class="btn" onclick="handoff()">Pasar el teléfono</button></div>`); }
function handoff(){ Engine.endTurn(); const nm=activeName();
  $('veilTitle').textContent=`${nm}, te toca`; $('veilText').innerHTML=`Pasale el teléfono a <b>${esc(nm)}</b>.`;
  veil.style.display='flex'; $('veilBtn').textContent='Ya lo tengo'; $('veilBtn').onclick=()=>{ veil.style.display='none'; turnIntro(); }; }

/* Final (sin perdedor) */
function screenEnd(){ const s=Engine.state,a=s.players[0],b=s.players[1],deep=s.connection>=MODE_PACK.win.connectionDeep; let lead;
  if(a.sparks===b.sparks) lead=`Empate — ${a.sparks} Chispas cada uno.`;
  else { const w=a.sparks>b.sparks?a:b; lead=`${w.name} quedó al frente con ${w.sparks} Chispas.`; }
  hideHud();
  show(`<div class="card center">
    <div class="eyebrow">Resumen de la partida</div><div class="spacer"></div>
    <h2 class="display" style="font-size:32px">${deep?'Conexión profunda ♥':'Bien jugado'}</h2>
    <p style="margin-top:10px">${esc(lead)}<br>${deep?'Y juntos llenaron el medidor de Conexión — esa es la verdadera victoria.':'Construyeron '+s.connection+'% de Conexión juntos. Otra ronda y llegan.'}</p>
    <div style="display:flex; gap:12px; margin-top:8px">
      <div class="score" style="flex:1"><div class="nm"><span class="dot" style="background:${hex(a.color)}"></span>${esc(a.name)}</div><div class="sp">${a.sparks}</div><div class="spl">Chispas</div></div>
      <div class="score" style="flex:1"><div class="nm"><span class="dot" style="background:${hex(b.color)}"></span>${esc(b.name)}</div><div class="sp">${b.sparks}</div><div class="spl">Chispas</div></div>
    </div>
    <button class="btn" onclick="playAgain()">Jugar de nuevo</button>
    <button class="btn ghost" onclick="screenStart()">Por hoy listo</button>
  </div>`); }
function playAgain(){ if(scene3DReady) tokens.forEach(t=>t.userData.to=null);
  Engine.newGame(Profile.data.p1,Profile.data.p2); placeTokens(true);
  $('hud').style.display='flex'; $('conn').style.display='block'; refreshHud(); turnIntro(); }

/* ----------------------------- ARRANQUE ---------------------------------- */
function boot3D(){ try{ initScene(); }catch(e){ console.warn('El tablero 3D no arrancó; el juego corre igual.',e); } }
window.addEventListener('load', ()=>{
  Content.load(); Profile.load();
  screenStart();
  if(typeof THREE!=='undefined'){ boot3D(); }
  else { const s=document.createElement('script'); s.src='https://unpkg.com/three@0.128.0/build/three.min.js';
    s.onload=boot3D; s.onerror=()=>console.warn('Sin librería 3D en esta red — se juega sin tablero.'); document.head.appendChild(s); }
});
</script>
</body>
</html>
