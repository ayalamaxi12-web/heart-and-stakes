<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Corazones y Apuestas — NOVA FORGE STUDIO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root{--night-1:#1a1320;--night-2:#2a1d2e;--surface:#2d2230;--glow:#f4b860;--glow-soft:#ffd9a0;
    --rose:#e8717a;--teal:#6db3c9;--text:#f5ece4;--muted:#b9a8b0;--line:rgba(244,184,96,.18);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{font-family:"DM Sans",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--text);
    background:radial-gradient(120% 120% at 50% 0%,#2a1d2e 0%,#1a1320 55%,#120c16 100%);
    overflow:hidden;position:fixed;inset:0;}
  #scene{position:fixed;inset:0;z-index:0;touch-action:none;}
  #ui{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:18px;pointer-events:none;overflow-y:auto;}
  .panel{pointer-events:auto;width:100%;max-width:460px;margin:auto;}
  h1,h2,h3{font-family:"Fraunces",Georgia,serif;font-weight:500;margin:0;line-height:1.08;}
  .display{font-size:clamp(32px,8.5vw,50px);letter-spacing:-.01em;}
  .eyebrow{font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--glow);font-weight:700;}
  p{color:var(--muted);line-height:1.5;font-size:15px;}
  .card{background:linear-gradient(180deg,var(--surface) 0%,#271c2b 100%);border:1px solid var(--line);
    border-radius:24px;padding:22px 20px;box-shadow:0 30px 80px -30px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.04);
    backdrop-filter:blur(6px);animation:rise .42s cubic-bezier(.2,.8,.2,1) both;}
  @keyframes rise{from{opacity:0;transform:translateY(14px) scale(.98);}to{opacity:1;transform:none;}}
  .btn{pointer-events:auto;display:block;width:100%;border:none;cursor:pointer;font-family:"DM Sans";
    font-weight:700;font-size:16px;padding:15px 18px;border-radius:15px;margin-top:11px;color:#241a14;
    transition:transform .12s,filter .2s;background:linear-gradient(180deg,var(--glow-soft),var(--glow));
    box-shadow:0 10px 24px -8px rgba(244,184,96,.5);}
  .btn:active{transform:translateY(1px) scale(.99);}
  .btn.ghost{background:transparent;color:var(--text);border:1px solid var(--line);box-shadow:none;font-weight:500;}
  .btn.sm{font-size:13px;padding:9px 12px;margin-top:0;width:auto;}
  .field,textarea.field,select.field{width:100%;background:#211824;border:1px solid var(--line);color:var(--text);
    border-radius:14px;padding:13px 15px;font-family:"DM Sans";font-size:16px;margin-top:10px;}
  textarea.field{resize:vertical;min-height:74px;line-height:1.4;} select.field{appearance:none;}
  .field:focus{outline:none;border-color:var(--glow);}
  .swatches{display:flex;gap:9px;margin-top:9px;flex-wrap:wrap;}
  .sw{width:34px;height:34px;border-radius:50%;cursor:pointer;border:2px solid transparent;background-position:center;}
  .sw.sel{border-color:var(--text);transform:scale(1.12);}
  .lbl{font-size:12px;color:var(--muted);margin-top:12px;}
  .who{font-family:"Fraunces";font-size:13px;}
  .tag{display:inline-block;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--glow);font-weight:700;margin-bottom:12px;}
  .prompt{font-family:"Fraunces";font-size:clamp(21px,5.6vw,27px);line-height:1.22;margin:4px 0;}
  .center{text-align:center;}.spacer{height:10px;}.mini{font-size:13px;color:var(--muted);margin-top:14px;}
  .legend{display:flex;flex-wrap:wrap;gap:6px 12px;justify-content:center;margin-top:14px;font-size:12px;color:var(--muted);}
  #hud{position:fixed;top:0;left:0;right:0;z-index:3;padding:12px 14px;display:none;gap:10px;pointer-events:none;}
  .score{flex:1;background:rgba(20,14,22,.55);border:1px solid var(--line);border-radius:14px;padding:7px 11px;backdrop-filter:blur(8px);}
  .score .nm{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;}
  .hav{width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:13px;background:#211824;overflow:hidden;background-size:cover;background-position:center;flex:none;}
  .score .sp{font-family:"Fraunces";font-size:20px;}.score .spl{font-size:10px;color:var(--muted);}
  #conn{position:fixed;bottom:0;left:0;right:0;z-index:3;padding:10px 14px 16px;display:none;pointer-events:none;}
  .connbar{height:12px;border-radius:8px;background:rgba(20,14,22,.6);border:1px solid var(--line);overflow:hidden;}
  .connfill{height:100%;width:0%;border-radius:8px;background:linear-gradient(90deg,var(--rose),var(--glow));transition:width .6s cubic-bezier(.2,.8,.2,1);}
  .connlbl{font-size:11px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:6px;}
  #veil{position:fixed;inset:0;z-index:5;display:none;flex-direction:column;align-items:center;justify-content:center;
    padding:28px;text-align:center;background:radial-gradient(80% 60% at 50% 45%,#2a1d2e,#120c16);}
  .seal{width:104px;height:104px;border-radius:50%;margin-bottom:20px;
    background:radial-gradient(circle at 35% 30%,var(--glow-soft),var(--glow) 60%,#c98a2e);
    box-shadow:0 16px 50px -10px rgba(244,184,96,.5);display:flex;align-items:center;justify-content:center;font-size:44px;animation:pulse 2.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
  .ed-scroll{max-height:56vh;overflow-y:auto;margin:6px -4px 0;padding:0 4px;}
  .ed-cat{font-family:"Fraunces";font-size:18px;margin:16px 0 4px;}
  .ed-cat .h{font-size:12px;color:var(--muted);font-family:"DM Sans";font-weight:400;}
  .ed-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid rgba(244,184,96,.08);}
  .ed-row .tx{flex:1;font-size:14px;line-height:1.35;}.ed-row.off .tx{opacity:.4;}
  .chk{width:26px;height:26px;border-radius:8px;border:1px solid var(--line);background:#211824;color:var(--glow);font-size:15px;cursor:pointer;flex:none;display:flex;align-items:center;justify-content:center;}
  .chk.on{background:linear-gradient(180deg,var(--glow-soft),var(--glow));color:#241a14;border-color:transparent;}
  .ico{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:4px;}
  .toprow{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .hint{position:fixed;top:60px;left:0;right:0;text-align:center;z-index:1;font-size:11px;color:rgba(185,168,176,.5);pointer-events:none;}
  .foottag{position:fixed;bottom:5px;left:0;right:0;text-align:center;z-index:1;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:rgba(185,168,176,.4);}
  @media (prefers-reduced-motion: reduce){*{animation:none !important;transition:none !important;}}
</style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div id="hud">
    <div class="score"><div class="nm"><span class="hav" id="hav1"></span><span id="n1">Jugador 1</span></div><div class="sp" id="sp1">0</div><div class="spl">Chispas</div></div>
    <div class="score"><div class="nm"><span class="hav" id="hav2"></span><span id="n2">Jugador 2</span></div><div class="sp" id="sp2">0</div><div class="spl">Chispas</div></div>
  </div>
  <div id="conn"><div class="connlbl" id="connlbl">Conexión</div><div class="connbar"><div class="connfill" id="connfill"></div></div></div>
  <div class="hint" id="hint" style="display:none">Arrastrá para girar · pellizcá para acercar</div>
  <div id="ui"><div class="panel" id="panel"></div></div>
  <div id="veil">
    <div class="seal">🤫</div>
    <h2 class="display" id="veilTitle">En secreto</h2>
    <p id="veilText" style="max-width:320px;"></p>
    <button class="btn" id="veilBtn" style="max-width:320px;">Ya tengo el teléfono</button>
    <div class="mini">Pasá el teléfono antes de tocar.</div>
  </div>
  <div class="foottag">NOVA FORGE STUDIO · prototipo</div>

<script>
/* ===========================================================================
   CORAZONES Y APUESTAS — prototipo · NOVA FORGE STUDIO
   Motor/contenido separados (GDD §4). Esta versión agrega:
   tablero más grande + control táctil (girar/pellizcar), casilleros con su
   símbolo visible (sabés el tipo, no el contenido), peones con avatar
   (emoji o foto), y editor de preguntas en español con guardado local.
   =========================================================================== */

/* ----------------------- CONTENIDO POR DEFECTO --------------------------- */
const CAT_LABEL={reveal:'Revelar y adivinar',match:'¿En sintonía?',playful:'Juego / Reto',connection:'Momento',wager:'Apuesta'};
const CAT_HELP={
  reveal:'Una pregunta sobre quien responde. Escribí {a} donde quieras que aparezca su nombre.',
  match:'Una opción A o B para responder al mismo tiempo.',
  playful:'Un reto para hacer. Escribí {p} para el nombre de la pareja.',
  connection:'Un momento lindo, sin puntos.',
  wager:'Una apuesta opcional con un premio jugado.'};
const DEFAULT_CONTENT={
  reveal:["{a}, ¿cuál sería tu domingo perfecto sin hacer nada?","{a}, si pudiéramos teletransportarnos ahora mismo, ¿a dónde irías?",
    "{a}, ¿qué cosa chiquita siempre te alegra el día?","{a}, ¿cuál es tu canción de consuelo secreta?","{a}, ¿qué pedís siempre en el café?",
    "{a}, ¿en qué mundo de ficción te gustaría vivir?","{a}, ¿qué es lo primero que comprarías si la plata no importara?",
    "{a}, ¿qué comida podrías comer feliz todos los días?","{a}, ¿cuál es tu idea de una cita perfecta?","{a}, ¿en qué sos raramente bueno/a?",
    "{a}, ¿cuál es el emoji que más usás?","{a}, ¿de qué cosa chiquita estás orgulloso/a esta semana?"],
  match:["¿Montaña o playa?","¿Madrugador/a o nocturno/a?","¿Dulce o salado?","¿Planear todo o fluir?","¿Fiesta grande o noche tranquila en casa?",
    "¿Mensajes o llamadas?","¿Amanecer o atardecer?","¿Cocinar en casa o salir a comer?"],
  playful:["Dale a {p} un discurso motivador de 10 segundos.","Hacé tu mejor imitación de {p} pidiendo un café.",
    "Describí a {p} usando solo títulos de películas.","Decile a {p} un cumplido que nunca le hayas dicho.","Recreá la cara que pusiste en su primera cita."],
  connection:["Díganse una cosa por la que están agradecidos hoy.","Compartan un recuerdo de ustedes dos que siempre los haga sonreír.",
    "Nombren algo que tengan ganas de hacer juntos.","Levantá la vista del teléfono y decí algo lindo, en voz alta."],
  wager:["Concurso de miradas de 10 segundos. El que pierde prepara el próximo snack.","El primero que se ría hace el baile ridículo que elija el otro.",
    "Piedra, papel o tijera: el ganador elige la próxima canción."]};

/* ----------------------- ALMACÉN (persistencia) -------------------------- */
const LS_CONTENT='cya_content_v1',LS_PROFILE='cya_profile_v2';
let storageOK=true;
function lsGet(k){try{return localStorage.getItem(k);}catch(e){storageOK=false;return null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);return true;}catch(e){storageOK=false;return false;}}
const Content={
  items:[],_seq:0,
  newId(){return 'p'+Date.now().toString(36)+(this._seq++);},
  build(){this.items=[];Object.keys(DEFAULT_CONTENT).forEach(cat=>{DEFAULT_CONTENT[cat].forEach(text=>this.items.push({id:this.newId(),cat,text,enabled:true,custom:false}));});},
  load(){const raw=lsGet(LS_CONTENT);if(raw){try{const o=JSON.parse(raw);if(o&&Array.isArray(o.items)&&o.items.length){this.items=o.items;return;}}catch(e){}}this.build();this.save();},
  save(){lsSet(LS_CONTENT,JSON.stringify({items:this.items}));},
  byCat(cat){return this.items.filter(i=>i.cat===cat);},
  enabled(cat){return this.items.filter(i=>i.cat===cat&&i.enabled);},
  has(cat){return this.enabled(cat).length>0;},
  toggle(id){const it=this.items.find(i=>i.id===id);if(it){it.enabled=!it.enabled;this.save();}},
  add(cat,text){this.items.push({id:this.newId(),cat,text:text.trim(),enabled:true,custom:true});this.save();},
  edit(id,text){const it=this.items.find(i=>i.id===id);if(it){it.text=text.trim();this.save();}},
  remove(id){this.items=this.items.filter(i=>i.id!==id);this.save();},
  reset(){this.build();this.save();}};
const AVATAR_EMOJIS=['🦊','🐼','🐨','🦁','🐯','🐸','🦄','🐙','🐵','🐱','🐶','🦖'];
const Profile={
  data:{p1:{name:"",color:0xe8717a,avatar:{type:'emoji',value:'🦊'}},p2:{name:"",color:0x6db3c9,avatar:{type:'emoji',value:'🐼'}}},
  load(){const raw=lsGet(LS_PROFILE);if(raw){try{const o=JSON.parse(raw);if(o&&o.p1&&o.p2)this.data=o;}catch(e){}}},
  save(){lsSet(LS_PROFILE,JSON.stringify(this.data));}};

/* ----------------------------- MODE PACK --------------------------------- */
const SYMBOLS={
  salida:{emoji:'⭐',color:0xf4b860,label:'Salida'},
  pregunta:{emoji:'❓',color:0x8fb8e0,label:'Pregunta'},
  reto:{emoji:'🎭',color:0xe8717a,label:'Reto'},
  apuesta:{emoji:'🔥',color:0xff9d5c,label:'Apuesta'},
  momento:{emoji:'💛',color:0x8fd6a0,label:'Momento'},
  premio:{emoji:'🎁',color:0xd9a8f0,label:'Premio'}};
const MODE_PACK={
  scoring:{reveal:{nailed:{sp:3,conn:14},close:{sp:2,conn:9},wayoff:{answererSp:3,conn:5}},
    match:{sp:1,conn:8},playful:{sp:2,conn:7},reward:{sp:2,conn:4},wager_win:{sp:3,conn:6},wager_skip:{conn:3}},
  win:{lapsToGoal:1,connectionDeep:60,turnCap:18},
  boardTypes:["salida","pregunta","reto","premio","pregunta","momento","pregunta","apuesta",
              "reto","pregunta","premio","reto","momento","pregunta","apuesta","reto"]};

/* ----------------------------- MOTOR ------------------------------------- */
let lastDraw={};
const Engine={
  state:null,
  newGame(p1,p2){this.state={pack:MODE_PACK,
    players:[{name:p1.name||"Jugador 1",color:p1.color,sparks:0,pos:0,laps:0},
             {name:p2.name||"Jugador 2",color:p2.color,sparks:0,pos:0,laps:0}],
    connection:0,active:0,turn:0};lastDraw={};return this.state;},
  roll(){return 1+Math.floor(Math.random()*3);},
  drawByCat(cat){let pool=Content.enabled(cat);if(!pool.length)return null;
    if(pool.length>1)pool=pool.filter(i=>i.id!==lastDraw[cat]);
    const pick=pool[Math.floor(Math.random()*pool.length)];lastDraw[cat]=pick.id;return pick.text;},
  tileCat(pos){return MODE_PACK.boardTypes[pos%MODE_PACK.boardTypes.length];},
  advance(steps){const s=this.state,p=s.players[s.active],n=MODE_PACK.boardTypes.length;
    for(let i=0;i<steps;i++){p.pos=(p.pos+1)%n;if(p.pos===0)p.laps++;}return p.pos;},
  addScore({playerIdx=null,sparks=0,conn=0}={}){const s=this.state;
    if(playerIdx!==null)s.players[playerIdx].sparks+=sparks;s.connection=Math.min(100,s.connection+conn);},
  checkWin(){const s=this.state,w=MODE_PACK.win;return s.players.some(p=>p.laps>=w.lapsToGoal)||s.turn>=w.turnCap;},
  endTurn(){const s=this.state;s.active=s.active===0?1:0;s.turn++;}};

/* ----------------------------- TABLERO 3D -------------------------------- */
let renderer,scene,camera,tiles=[],tokens=[],die,dieSpin=0,raf,scene3DReady=false;
const camState={radius:14,theta:0.0,phi:0.92};
function ringPositions(){const N=5,gap=1.32,off=(N-1)/2,ring=[],pts=[];
  for(let c=0;c<N;c++)ring.push([0,c]);for(let r=1;r<N;r++)ring.push([r,N-1]);
  for(let c=N-2;c>=0;c--)ring.push([N-1,c]);for(let r=N-2;r>=1;r--)ring.push([r,0]);
  ring.forEach(([r,c])=>pts.push([(c-off)*gap,0,(r-off)*gap]));return pts;}
function updateCamera(){if(!camera)return;const r=camState.radius,p=camState.phi,t=camState.theta;
  camera.position.set(r*Math.sin(p)*Math.sin(t),r*Math.cos(p),r*Math.sin(p)*Math.cos(t));camera.lookAt(0,0,0);}
function symbolTexture(emoji,bgHex){const c=document.createElement('canvas');c.width=c.height=128;const x=c.getContext('2d');
  x.fillStyle=bgHex;x.fillRect(0,0,128,128);x.fillStyle='rgba(0,0,0,.12)';x.fillRect(0,0,128,12);
  x.font='72px serif';x.textAlign='center';x.textBaseline='middle';x.fillText(emoji,64,72);
  const t=new THREE.CanvasTexture(c);return t;}
function avatarTexture(entry,ringHex){const c=document.createElement('canvas');c.width=c.height=128;const x=c.getContext('2d');
  x.fillStyle=ringHex;x.beginPath();x.arc(64,64,62,0,7);x.fill();x.fillStyle='#1a1320';x.beginPath();x.arc(64,64,55,0,7);x.fill();
  const tex=new THREE.CanvasTexture(c);
  if(entry&&entry.avatar&&entry.avatar.type==='photo'){const img=new Image();
    img.onload=()=>{x.save();x.beginPath();x.arc(64,64,55,0,7);x.clip();
      const s=Math.max(110/img.width,110/img.height),w=img.width*s,h=img.height*s;
      x.drawImage(img,64-w/2,64-h/2,w,h);x.restore();tex.needsUpdate=true;};img.src=entry.avatar.value;}
  else{const emo=(entry&&entry.avatar&&entry.avatar.type==='emoji')?entry.avatar.value:'😊';
    x.font='66px serif';x.textAlign='center';x.textBaseline='middle';x.fillText(emo,64,70);tex.needsUpdate=true;}
  return tex;}
function buildToken(i){const g=new THREE.Group();const col=i===0?0xe8717a:0x6db3c9;
  const ring=new THREE.Mesh(new THREE.TorusGeometry(.3,.06,12,28),new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:.45,roughness:.3,metalness:.4}));
  ring.rotation.x=Math.PI/2;ring.position.y=.02;
  const body=new THREE.Mesh(new THREE.CylinderGeometry(.1,.24,.5,20),new THREE.MeshStandardMaterial({color:col,roughness:.25,metalness:.4}));
  body.position.y=.27;
  const disc=new THREE.Mesh(new THREE.PlaneGeometry(.64,.64),new THREE.MeshBasicMaterial({transparent:true,side:THREE.DoubleSide}));
  disc.position.y=.95;
  g.add(ring);g.add(body);g.add(disc);g.userData={ring,body,disc};return g;}
function initScene(){
  if(typeof THREE==='undefined'){console.warn('Sin librería 3D — el juego corre igual.');return;}
  const cv=document.getElementById('scene');
  renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));resize();
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.1,100);updateCamera();
  scene.add(new THREE.AmbientLight(0xffe7c4,.55));
  const key=new THREE.PointLight(0xffd9a0,1.6,50);key.position.set(0,9,3);scene.add(key);
  const rim=new THREE.DirectionalLight(0x6db3c9,.5);rim.position.set(-5,4,-6);scene.add(rim);
  const base=new THREE.Mesh(new THREE.BoxGeometry(8.6,0.5,8.6),new THREE.MeshStandardMaterial({color:0x241826,roughness:.85,metalness:.1}));
  base.position.y=-0.45;scene.add(base);
  const inlay=new THREE.Mesh(new THREE.BoxGeometry(7.5,0.06,7.5),new THREE.MeshStandardMaterial({color:0x33223a,roughness:.6,emissive:0x1a0f1f}));
  inlay.position.y=-0.16;scene.add(inlay);
  const pts=ringPositions();
  pts.forEach((p,i)=>{const cat=MODE_PACK.boardTypes[i],meta=SYMBOLS[cat];
    const side=new THREE.MeshStandardMaterial({color:meta.color,roughness:.5,metalness:.2});
    const top=new THREE.MeshStandardMaterial({map:symbolTexture(meta.emoji,hex(meta.color)),roughness:.45,metalness:.15});
    const mats=[side,side,top,side,side,side];
    const m=new THREE.Mesh(new THREE.BoxGeometry(.94,.22,.94),mats);
    m.position.set(p[0],0,p[2]);scene.add(m);tiles.push(m);});
  [0,1].forEach(i=>{const g=buildToken(i);scene.add(g);tokens.push(g);});
  die=new THREE.Mesh(new THREE.BoxGeometry(.7,.7,.7),new THREE.MeshStandardMaterial({color:0xfff2dc,roughness:.35,metalness:.1}));
  die.position.set(0,.8,0.1);scene.add(die);
  placeTokens(true);scene3DReady=true;setupControls(cv);animate();addEventListener('resize',resize);
}
function resize(){if(!renderer)return;renderer.setSize(innerWidth,innerHeight);
  if(camera){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();}}
function tokenTarget(idx){const pts=ringPositions(),p=pts[Engine.state.players[idx].pos],o=idx===0?-0.17:0.17;
  return new THREE.Vector3(p[0]+o,.1,p[2]+o);}
function placeTokens(instant){if(!scene3DReady)return;
  tokens.forEach((t,i)=>{const tg=tokenTarget(i);if(instant){t.position.copy(tg);}else{t.userData.to=tg;t.userData.t=0;}});}
function updateTokenAppearance(){if(!scene3DReady)return;
  [0,1].forEach(i=>{const e=Profile.data['p'+(i+1)],col=e.color,ud=tokens[i].userData;
    ud.ring.material.color.setHex(col);ud.ring.material.emissive.setHex(col);ud.body.material.color.setHex(col);
    ud.disc.material.map=avatarTexture(e,hex(col));ud.disc.material.needsUpdate=true;});}
function animate(){raf=requestAnimationFrame(animate);
  const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
  tokens.forEach(t=>{if(t.userData.disc&&camera)t.userData.disc.quaternion.copy(camera.quaternion);
    if(t.userData.to){t.userData.t=Math.min(1,(t.userData.t||0)+(reduce?1:.08));
      t.position.lerp(t.userData.to,reduce?1:.18);t.position.y=.1+(reduce?0:Math.sin(t.userData.t*Math.PI)*.4);
      if(t.userData.t>=1){t.position.copy(t.userData.to);t.userData.to=null;}}});
  if(dieSpin>0&&!reduce){die.rotation.x+=.34;die.rotation.y+=.27;dieSpin--;if(dieSpin===0)die.rotation.set(0,0,0);}
  renderer.render(scene,camera);}
function pulseTile(pos){if(!scene3DReady)return;const m=tiles[pos];if(!m)return;
  const mats=Array.isArray(m.material)?m.material:[m.material];
  mats.forEach(mt=>mt.emissive&&mt.emissive.setHex(0x5a3a12));
  setTimeout(()=>mats.forEach(mt=>mt.emissive&&mt.emissive.setHex(0x000000)),900);}
/* control táctil: 1 dedo gira, 2 dedos pellizcan */
function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function setupControls(cv){const pts=new Map();let pinch=null;
  cv.addEventListener('pointerdown',e=>{pts.set(e.pointerId,{x:e.clientX,y:e.clientY});
    try{cv.setPointerCapture(e.pointerId);}catch(_){}
    if(pts.size===2){const a=[...pts.values()];pinch={d:dist(a[0],a[1]),r:camState.radius};}});
  cv.addEventListener('pointermove',e=>{if(!pts.has(e.pointerId))return;
    const prev=pts.get(e.pointerId),cur={x:e.clientX,y:e.clientY};
    if(pts.size===1){camState.theta-=(cur.x-prev.x)*0.006;camState.phi-=(cur.y-prev.y)*0.006;
      camState.phi=Math.max(0.3,Math.min(1.4,camState.phi));updateCamera();}
    pts.set(e.pointerId,cur);
    if(pts.size===2&&pinch){const a=[...pts.values()],d=dist(a[0],a[1]);
      camState.radius=Math.max(7,Math.min(24,pinch.r*(pinch.d/Math.max(1,d))));updateCamera();}
    e.preventDefault();},{passive:false});
  const end=e=>{pts.delete(e.pointerId);if(pts.size<2)pinch=null;};
  cv.addEventListener('pointerup',end);cv.addEventListener('pointercancel',end);}

    <button class="btn" onclick="handoff()">Pasar el teléfono</button></div>`);}
function handoff(){Engine.endTurn();const nm=activeName();
  $('veilTitle').textContent=`${nm}, te toca`;$('veilText').innerHTML=`Pasale el teléfono a <b>${esc(nm)}</b>.`;
  veil.style.display='flex';$('veilBtn').textContent='Ya lo tengo';$('veilBtn').onclick=()=>{veil.style.display='none';turnIntro();};}
function screenEnd(){const s=Engine.state,a=s.players[0],b=s.players[1],deep=s.connection>=MODE_PACK.win.connectionDeep;let lead;
  if(a.sparks===b.sparks)lead=`Empate — ${a.sparks} Chispas cada uno.`;
  else{const w=a.sparks>b.sparks?a:b;lead=`${w.name} quedó al frente con ${w.sparks} Chispas.`;}
  hideHud();
  show(`<div class="card center"><div class="eyebrow">Resumen de la partida</div><div class="spacer"></div>
    <h2 class="display" style="font-size:32px">${deep?'Conexión profunda ♥':'Bien jugado'}</h2>
    <p style="margin-top:10px">${esc(lead)}<br>${deep?'Y juntos llenaron el medidor de Conexión — esa es la verdadera victoria.':'Construyeron '+s.connection+'% de Conexión juntos. Otra ronda y llegan.'}</p>
    <div style="display:flex;gap:12px;margin-top:8px">
      <div class="score" style="flex:1"><div class="nm">${avatarChar(a)} ${esc(a.name)}</div><div class="sp">${a.sparks}</div><div class="spl">Chispas</div></div>
      <div class="score" style="flex:1"><div class="nm">${avatarChar(b)} ${esc(b.name)}</div><div class="sp">${b.sparks}</div><div class="spl">Chispas</div></div></div>
    <button class="btn" onclick="playAgain()">Jugar de nuevo</button>
    <button class="btn ghost" onclick="screenStart()">Por hoy listo</button></div>`);}
function playAgain(){if(scene3DReady)tokens.forEach(t=>t.userData.to=null);
  Engine.newGame(Profile.data.p1,Profile.data.p2);placeTokens(true);showHud();refreshHud();turnIntro();}

/* ----------------------------- ARRANQUE ---------------------------------- */
function boot3D(){try{initScene();}catch(e){console.warn('El tablero 3D no arrancó; el juego corre igual.',e);}}
window.addEventListener('load',()=>{Content.load();Profile.load();screenStart();
  if(typeof THREE!=='undefined'){boot3D();}
  else{const s=document.createElement('script');s.src='https://unpkg.com/three@0.128.0/build/three.min.js';
    s.onload=boot3D;s.onerror=()=>console.warn('Sin librería 3D en esta red — se juega sin tablero.');document.head.appendChild(s);}});
</script>
</body>
</html>
